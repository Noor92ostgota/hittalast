<!doctype html>
<html lang="sv">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>hittalast.se</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg:#f5f6f8; --card:#fff; --ink:#1a1d22; --muted:#6b7280; --line:#e5e7eb;
    --brand:#1f5fb0; --brand-ink:#fff; --ok:#147a3d; --warn:#b45309; --danger:#b42318;
    --open:#1f5fb0; --accepted:#147a3d; --completed:#4b5563;
  }
  *{box-sizing:border-box}
  body{margin:0;font:14px/1.45 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--ink)}
  header.topbar{background:#0f2847;color:#fff;padding:12px 20px;display:flex;align-items:center;gap:16px}
  header.topbar h1{font-size:16px;margin:0;font-weight:600;letter-spacing:.3px}

  header.topbar nav a{color:#dbe4f0;text-decoration:none;padding:6px 10px;border-radius:6px}
  header.topbar nav a:hover{background:rgba(255,255,255,.08)}
  header.topbar .who{color:#9fb3cf;font-size:12px;margin-right:8px}
  main{max-width:1100px;margin:24px auto;padding:0 20px}
  h2{margin:0 0 16px;font-size:20px}
  h3{margin:0 0 12px;font-size:15px;color:#374151}
  .card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:20px;margin-bottom:16px}
  .row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .row-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px}
  .row-4{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .fv-form h4{margin:10px 0 6px;font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .fv-form h4:first-child{margin-top:0}
  .fv-form .field{margin-bottom:8px}
  .fv-form textarea{min-height:50px}
  .fv-form .btn-row{margin-top:10px}
  label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:500}
  input,select,textarea{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:6px;font:inherit;background:#fff}
  input:focus,select:focus,textarea:focus{outline:2px solid var(--brand);outline-offset:-1px;border-color:var(--brand)}
  textarea{min-height:70px;resize:vertical}
  .field{margin-bottom:12px}
  .check{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .check input{width:auto}
  button,.btn{background:var(--brand);color:var(--brand-ink);border:0;padding:9px 14px;border-radius:6px;cursor:pointer;font:inherit;font-weight:500}
  button:hover,.btn:hover{filter:brightness(1.08)}
  button.secondary,.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
  button.ok{background:var(--ok)} button.warn{background:var(--warn)} button.danger{background:var(--danger)}
  button:disabled{opacity:.5;cursor:not-allowed}
  .btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px}
  table{width:100%;border-collapse:collapse}
  th,td{padding:10px 8px;text-align:left;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  table.compact{font-size:13px;table-layout:auto}
  table.compact th,table.compact td{padding:6px 6px;line-height:1.3}
  table.compact .badge{font-size:10px;padding:1px 6px;margin:1px 2px 1px 0}
  table.compact .icon-btn{padding:4px 8px;font-size:12px;line-height:1}
  table.compact .nowrap{white-space:nowrap}
  tr:hover td{background:#fafbfc;cursor:pointer}
  .badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:999px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
  .badge.open{background:#e0ecff;color:var(--open)}
  .badge.accepted{background:#d6f2e0;color:var(--accepted)}
  .badge.completed{background:#e5e7eb;color:var(--completed)}
  .badge.feature{background:#fff3e0;color:#b45309;margin-right:4px}
  .muted{color:var(--muted)}
  .tabs{display:flex;gap:4px;border-bottom:1px solid var(--line);margin-bottom:16px}
  .tabs button{background:none;color:var(--muted);border-radius:0;border-bottom:2px solid transparent;padding:10px 14px;font-weight:500}
  .tabs button.active{color:var(--brand);border-bottom-color:var(--brand)}
  .empty{text-align:center;padding:40px;color:var(--muted)}
  .auth-wrap{max-width:400px;margin:80px auto}
  .auth-wrap .card{padding:28px}
  .auth-wrap h2{text-align:center;margin-bottom:20px}
  .auth-wrap .switch{text-align:center;margin-top:12px;font-size:13px}
  .auth-wrap a{color:var(--brand);cursor:pointer;text-decoration:none}
  .kv{display:grid;grid-template-columns:160px 1fr;gap:6px 16px;font-size:13px;margin:4px 0}
  .kv dt{color:var(--muted)}
  .kv dd{margin:0}
  .chat{border:1px solid var(--line);border-radius:8px;background:#fafbfc;height:340px;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
  .msg{max-width:72%;padding:8px 12px;border-radius:10px;font-size:13px;word-wrap:break-word}
  .msg.me{align-self:flex-end;background:var(--brand);color:#fff}
  .msg.them{align-self:flex-start;background:#fff;border:1px solid var(--line)}
  .msg .who{font-size:11px;opacity:.75;margin-bottom:2px;font-weight:600}
  .msg .ts{font-size:10px;opacity:.65;margin-top:2px}
  .chat-input{display:flex;gap:8px;margin-top:10px}
  .chat-input textarea{flex:1;min-height:42px;max-height:120px}
  .chat-thread-list .thread-item{padding:10px;border:1px solid var(--line);border-radius:6px;margin-bottom:8px;cursor:pointer;background:#fff}
  .chat-thread-list .thread-item.active{border-color:var(--brand);background:#f0f6ff}
  .thumb{max-width:100%;max-height:240px;border-radius:6px;border:1px solid var(--line);display:block;margin-top:6px}
  .toast{position:fixed;bottom:20px;right:20px;background:#1a1d22;color:#fff;padding:12px 18px;border-radius:8px;box-shadow:0 4px 12px rgba(0,0,0,.15);z-index:1000;animation:slide .2s ease-out}
  .toast.err{background:var(--danger)}
  @keyframes slide{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
  .banner{padding:10px 14px;border-radius:6px;margin-bottom:12px;font-size:13px}
  .banner.warn{background:#fef3c7;color:#92400e;border:1px solid #fcd34d}
  .banner.info{background:#e0ecff;color:#1e40af;border:1px solid #93c5fd}
  .banner.ok{background:#d6f2e0;color:var(--accepted);border:1px solid #86efac}
  .banner.err{background:#fee2e2;color:#991b1b;border:1px solid #fca5a5}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
  .stat{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px}
  .stat .val{font-size:22px;font-weight:600}
  .stat .lbl{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.3px;margin-top:2px}

  /* ============== LANDING PAGE (lansering 1 juni) ============== */
  .landing{min-height:100vh;background:linear-gradient(135deg,#0f2847 0%,#1f5fb0 60%,#2d7fd9 100%);color:#fff;position:relative;overflow:hidden}
  .landing::before{content:"";position:absolute;top:-10%;left:-10%;width:60%;height:60%;background:radial-gradient(circle,rgba(255,255,255,.08) 0%,transparent 70%);pointer-events:none}
  .landing::after{content:"";position:absolute;bottom:-30%;right:-10%;width:70%;height:70%;background:radial-gradient(circle,rgba(255,200,80,.10) 0%,transparent 70%);pointer-events:none}
  .landing-inner{max-width:1100px;margin:0 auto;padding:60px 24px 40px;position:relative;z-index:1}
  .landing-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:60px}
  .landing-logo{font-size:24px;font-weight:700;letter-spacing:-.5px;display:flex;align-items:center;gap:8px;cursor:pointer;color:#fff;text-decoration:none}
  .landing-logo-mark{display:inline-block;width:36px;height:36px;background:#fff;border-radius:10px;color:var(--brand);display:inline-flex;align-items:center;justify-content:center;font-size:22px}
  .landing-staff{font-size:13px;color:rgba(255,255,255,.55);text-decoration:none;cursor:pointer}
  .landing-staff:hover{color:rgba(255,255,255,.85)}
  .landing-hero{display:grid;grid-template-columns:1.2fr 1fr;gap:48px;align-items:center}
  .landing-eyebrow{display:inline-block;background:rgba(255,255,255,.12);padding:6px 14px;border-radius:999px;font-size:13px;font-weight:600;letter-spacing:.4px;margin-bottom:18px;backdrop-filter:blur(6px)}
  .landing-h1{font-size:clamp(32px,5vw,52px);line-height:1.08;margin:0 0 18px;font-weight:700;letter-spacing:-.8px}
  .landing-h1 .accent{color:#fcd34d}
  .landing-sub{font-size:clamp(15px,1.4vw,18px);line-height:1.55;color:rgba(255,255,255,.86);margin-bottom:28px;max-width:560px}
  .landing-bullets{list-style:none;padding:0;margin:0 0 32px;display:flex;flex-wrap:wrap;gap:10px 20px}
  .landing-bullets li{display:flex;align-items:center;gap:6px;font-size:14px;color:rgba(255,255,255,.92)}
  .landing-bullets li::before{content:"✓";color:#fcd34d;font-weight:bold}
  .landing-card{background:rgba(255,255,255,.97);color:var(--ink);padding:30px;border-radius:16px;box-shadow:0 25px 60px rgba(0,0,0,.3),0 8px 20px rgba(0,0,0,.15);position:relative}
  .landing-card h2{font-size:20px;margin:0 0 6px;color:var(--ink)}
  .landing-card .lead{font-size:13px;color:var(--muted);margin-bottom:18px}
  .landing-card label{font-size:12px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.3px;margin-bottom:4px;display:block}
  .landing-card input,.landing-card select{width:100%;padding:11px 14px;border:1.5px solid #e5e7eb;border-radius:8px;font-size:14px;background:#fff;margin-bottom:12px}
  .landing-card input:focus,.landing-card select:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(31,95,176,.15)}
  .landing-card .btn-primary{width:100%;padding:13px;background:linear-gradient(135deg,#1f5fb0 0%,#2d7fd9 100%);color:#fff;border:0;border-radius:8px;font-weight:600;font-size:15px;cursor:pointer;letter-spacing:.2px;transition:transform .1s,box-shadow .2s;box-shadow:0 4px 14px rgba(31,95,176,.4)}
  .landing-card .btn-primary:hover:not(:disabled){transform:translateY(-1px);box-shadow:0 6px 18px rgba(31,95,176,.5)}
  .landing-card .btn-primary:disabled{opacity:.7;cursor:not-allowed}
  .landing-card .fineprint{font-size:11px;color:var(--muted);text-align:center;margin-top:14px;line-height:1.5}
  .landing-success{background:#d6f2e0;color:#147a3d;padding:24px;border-radius:12px;text-align:center}
  .landing-success h3{margin:0 0 8px;font-size:18px;color:#147a3d}
  .landing-success p{margin:0;font-size:14px}
  .countdown{display:flex;gap:14px;margin:30px 0}
  .countdown-box{flex:1;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:14px 6px;text-align:center;backdrop-filter:blur(6px)}
  .countdown-val{font-size:clamp(22px,3.5vw,34px);font-weight:700;line-height:1;color:#fff}
  .countdown-lbl{font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:rgba(255,255,255,.7);margin-top:4px}
  .landing-features{display:grid;grid-template-columns:repeat(3,1fr);gap:18px;margin-top:80px;padding-top:48px;border-top:1px solid rgba(255,255,255,.12)}
  .feature{background:rgba(255,255,255,.06);padding:22px;border-radius:14px;border:1px solid rgba(255,255,255,.1);backdrop-filter:blur(8px)}
  .feature h3{font-size:15px;margin:0 0 8px;color:#fff;font-weight:600}
  .feature p{font-size:13px;color:rgba(255,255,255,.78);line-height:1.5;margin:0}
  .feature-icon{font-size:24px;margin-bottom:8px;display:block}
  .landing-footer{text-align:center;padding:40px 0 20px;color:rgba(255,255,255,.55);font-size:12px}
  @media (max-width:800px){
    .landing-inner{padding:30px 16px}
    .landing-hero{grid-template-columns:1fr;gap:30px}
    .landing-nav{margin-bottom:30px}
    .landing-features{grid-template-columns:1fr;gap:14px;margin-top:50px;padding-top:30px}
    .countdown{gap:8px}
    .countdown-box{padding:10px 4px}
  }

  /* ============== RESPONSIVE: tablet (≤900px) ============== */
  @media (max-width:900px){
    main{padding:0 14px;margin:16px auto}
    .row,.row-3,.row-4{grid-template-columns:1fr 1fr}
    .stats{grid-template-columns:repeat(2,1fr)}
    header.topbar{padding:10px 14px;gap:10px;flex-wrap:wrap}
    header.topbar nav a span.label{display:none}
    .kv{grid-template-columns:130px 1fr}
  }

  /* ============== RESPONSIVE: mobile (≤600px) ============== */
  @media (max-width:600px){
    body{font-size:14px}
    main{padding:0 10px;margin:10px auto}
    h2{font-size:18px;margin-bottom:12px}
    h3{font-size:14px}
    .card{padding:14px;margin-bottom:12px;border-radius:8px}

    /* Stacka alla formulärrader */
    .row,.row-3,.row-4{grid-template-columns:1fr;gap:8px}

    /* Stats: 2 i bredd */
    .stats{grid-template-columns:repeat(2,1fr);gap:8px}
    .stat{padding:10px}
    .stat .val{font-size:18px}
    .stat .lbl{font-size:10px}

    /* Topbar: tillåt scroll horisontellt vid många items */
    header.topbar{padding:10px;gap:8px;flex-wrap:nowrap;overflow-x:auto;-webkit-overflow-scrolling:touch}
    header.topbar h1{font-size:14px;white-space:nowrap;flex-shrink:0}
    header.topbar nav{gap:4px;margin-left:auto;flex-shrink:0;overflow-x:auto}
    header.topbar nav a{padding:6px 8px;font-size:13px;white-space:nowrap}
    header.topbar nav a span.label{display:none}
    header.topbar .who{font-size:11px;white-space:nowrap;margin-right:4px}
    header.topbar a[href="#"]:has(.label),
    header.topbar a#logout-link{font-size:12px}

    /* Tabeller: gör scrollbara horisontellt */
    .card>table,
    .card>div>table,
    .card table{display:block;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch}
    .card>table thead,
    .card table thead{display:table-header-group}
    .card>table tbody,
    .card table tbody{display:table-row-group}
    .card>table tr,
    .card table tr{display:table-row}
    .card>table th,
    .card>table td,
    .card table th,
    .card table td{display:table-cell;padding:8px 6px;font-size:12px;white-space:nowrap;max-width:none}
    table.compact th,table.compact td{padding:6px 4px;font-size:11px}

    /* Knappar: större touch-yta */
    button,.btn{padding:10px 14px;font-size:14px;min-height:40px}
    .btn-row{gap:6px}
    .btn-row .btn,.btn-row button{flex:1 1 auto;min-width:0}
    table .icon-btn,button.icon-btn,.btn.icon-btn{min-height:auto;padding:6px 10px;font-size:13px}

    /* Auth-vy */
    .auth-wrap{margin:20px 10px;max-width:none}
    .auth-wrap .card{padding:18px}

    /* Key-value lists */
    .kv{grid-template-columns:1fr;gap:2px 0;margin:8px 0}
    .kv dt{color:var(--muted);font-size:11px;margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.3px}
    .kv dd{margin:0 0 4px;font-size:14px}

    /* Chatt */
    .chat{height:280px;padding:10px}
    .msg{max-width:88%;font-size:13px}

    /* Banner */
    .banner{padding:8px 12px;font-size:12px}

    /* Toast */
    .toast{left:10px;right:10px;bottom:10px;padding:10px 14px;font-size:13px}

    /* Inputs */
    input,select,textarea{padding:10px 12px;font-size:16px} /* 16px hindrar zoom på iOS */
    textarea{min-height:60px}

    /* Badges mindre */
    .badge{font-size:10px;padding:1px 6px}

    /* Empty state mindre padding */
    .empty{padding:24px 16px}

    /* Booking-rader: bredare touch-yta */
    tr[data-id]>td:first-child{padding-left:8px}
  }

  /* ============== RESPONSIVE: small mobile (≤380px) ============== */
  @media (max-width:380px){
    .stats{grid-template-columns:1fr}
    header.topbar h1{font-size:13px}
    h2{font-size:16px}
  }
</style>

<div id="app"></div>
<div id="toast-host"></div>

<script>
// =====================================================================
// TRANSPORTPLATTFORM — MVP (single-file, IndexedDB)
// Roller: åkare (kan både publicera och acceptera), chaufför, admin
// Flöde: skapa körning → åkare accepterar → chatt → utfört → provision 8%
// =====================================================================

// --------- Supabase-anslutning ---------
const SUPABASE_URL = 'https://xbcyhtozyyvnoyeqstru.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_eus87d1_edxEgfeiecCeRA_1TfFb-xK';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { persistSession: true, autoRefreshToken: true, detectSessionInUrl: true }
});

// Tabellnamn-mappning: gamla store-namn → Supabase-tabeller
const TABLE_MAP = {
  users: 'profiles',
  bookings: 'bookings',
  vehicles: 'vehicles',
  drivers: 'drivers',
  bids: 'bids',
  messages: 'messages',
  notifications: 'notifications',
  freeVehicles: 'free_vehicles',
};

// camelCase ↔ snake_case helpers
function camelToSnake(str) { return str.replace(/([A-Z])/g, '_$1').toLowerCase(); }
function snakeToCamel(str) { return str.replace(/_([a-z])/g, (_, c) => c.toUpperCase()); }
function objToSnake(obj) {
  if (!obj || typeof obj !== 'object' || obj instanceof Date || obj instanceof Blob) return obj;
  if (Array.isArray(obj)) return obj;
  const out = {};
  for (const k in obj) {
    if (obj[k] === undefined) continue;
    if (k === 'passwordHash') continue;
    out[camelToSnake(k)] = obj[k];
  }
  return out;
}
function objToCamel(obj) {
  if (!obj || typeof obj !== 'object' || obj instanceof Date) return obj;
  if (Array.isArray(obj)) return obj.map(objToCamel);
  const out = {};
  for (const k in obj) out[snakeToCamel(k)] = obj[k];
  return out;
}

// DB-wrapper med Supabase. Bevarar gamla API:t (db.add/get/byIndex/put/del/all).
const db = {
  async all(table) {
    const t = TABLE_MAP[table] || table;
    const { data, error } = await sb.from(t).select('*');
    if (error) { console.error('db.all', t, error); throw error; }
    return (data || []).map(objToCamel);
  },
  async get(table, id) {
    const t = TABLE_MAP[table] || table;
    if (!id) return null;
    const { data, error } = await sb.from(t).select('*').eq('id', id).maybeSingle();
    if (error) { console.error('db.get', t, id, error); throw error; }
    return data ? objToCamel(data) : null;
  },
  async byIndex(table, key, value) {
    const t = TABLE_MAP[table] || table;
    const col = camelToSnake(key);
    if (value === undefined || value === null) return [];
    const { data, error } = await sb.from(t).select('*').eq(col, value);
    if (error) { console.error('db.byIndex', t, col, error); throw error; }
    return (data || []).map(objToCamel);
  },
  async oneByIndex(table, key, value) {
    const t = TABLE_MAP[table] || table;
    const col = camelToSnake(key);
    if (value === undefined || value === null) return null;
    const { data, error } = await sb.from(t).select('*').eq(col, value).maybeSingle();
    if (error) { console.error('db.oneByIndex', t, col, error); throw error; }
    return data ? objToCamel(data) : null;
  },
  async add(table, obj) {
    const t = TABLE_MAP[table] || table;
    const snakeObj = objToSnake(obj);
    delete snakeObj.id;
    // Bilder läggs i Storage separat; här tar vi bort blob-fält som inte finns i databasen
    if (snakeObj.booking_image instanceof Blob) delete snakeObj.booking_image;
    if (snakeObj.proof_image instanceof Blob) delete snakeObj.proof_image;
    // Mappa timestamp-nummer → ISO-strängar
    for (const k of ['created_at','accepted_at','completed_at','assigned_at','updated_at','subscription_activated_at']) {
      if (typeof snakeObj[k] === 'number') snakeObj[k] = new Date(snakeObj[k]).toISOString();
    }
    // 'read' boolean (var 0/1 i gamla koden)
    if (typeof snakeObj.read === 'number') snakeObj.read = !!snakeObj.read;
    const { data, error } = await sb.from(t).insert(snakeObj).select().single();
    if (error) { console.error('db.add', t, error, snakeObj); throw error; }
    return objToCamel(data);
  },
  async put(table, obj) {
    const t = TABLE_MAP[table] || table;
    const snakeObj = objToSnake(obj);
    const id = snakeObj.id;
    if (snakeObj.booking_image instanceof Blob) delete snakeObj.booking_image;
    if (snakeObj.proof_image instanceof Blob) delete snakeObj.proof_image;
    for (const k of ['created_at','accepted_at','completed_at','assigned_at','updated_at','subscription_activated_at']) {
      if (typeof snakeObj[k] === 'number') snakeObj[k] = new Date(snakeObj[k]).toISOString();
    }
    if (typeof snakeObj.read === 'number') snakeObj.read = !!snakeObj.read;
    const { data, error } = await sb.from(t).update(snakeObj).eq('id', id).select().single();
    if (error) { console.error('db.put', t, id, error, snakeObj); throw error; }
    return objToCamel(data);
  },
  async del(table, id) {

};

async function uploadImage(file, bucket = 'booking-images') {
  if (!file || !file.name || !file.size) return null;
  const ext = (file.name.split('.').pop() || 'png').toLowerCase();
  const path = `${(crypto.randomUUID && crypto.randomUUID()) || Date.now() + '-' + Math.random().toString(36).slice(2)}.${ext}`;
  const { error } = await sb.storage.from(bucket).upload(path, file, { contentType: file.type || 'image/png' });
  if (error) { console.error('uploadImage', error); throw error; }
  const { data } = sb.storage.from(bucket).getPublicUrl(path);
  return data.publicUrl;
}

let _sessionUser = null;

async function refreshSession() {
  try {
    const { data: { session } } = await sb.auth.getSession();
    if (session && session.user) {
      const profile = await db.get('users', session.user.id);
      _sessionUser = profile ? { ...profile, email: session.user.email } : { id: session.user.id, email: session.user.email, role: 'akare', name: '' };
    } else {

    }

  const { data, error } = await sb.auth.signInWithPassword({ email, password: pwd });
  if (error) throw new Error('Fel e-post eller lösenord');

  return _sessionUser;
}

async function register(data) {
  const email = (data.email || '').toLowerCase().trim();
  const { data: result, error } = await sb.auth.signUp({
    email,
    password: data.pwd,
    options: { data: { name: data.name || '', role: data.role || 'akare' } }
  });
  if (error) {
    if (/already|registered/i.test(error.message)) throw new Error('E-post finns redan registrerad');
    throw error;
  }
  // Vänta så triggern hinner skapa profilen, uppdatera sedan
  await new Promise(r => setTimeout(r, 700));
  if (result.user) {
    await sb.from('profiles').update({
      role: data.role || 'akare',
      name: (data.name || '').trim(),
      phone: (data.phone || '').trim(),
      company: (data.company || '').trim(),
      org_nr: (data.orgNr || '').trim(),
      address: (data.address || '').trim(),
      contact_person: (data.contactPerson || '').trim(),
      invoice_recipient: (data.invoiceRecipient || '').trim(),
      invoice_address: (data.invoiceAddress || '').trim(),
      invoice_email: (data.invoiceEmail || '').trim(),
      invoice_gln: (data.invoiceGln || '').trim(),
      invoice_reference: (data.invoiceReference || '').trim(),
      offices: data.offices || [],
    }).eq('id', result.user.id);
  }
  await refreshSession();
  return _sessionUser;
}

  await sb.auth.signOut();

}

// --------- Smart text-parser för "Klistra in från mejl" ---------
// Hanterar svenska transport-mejl OCH DHL/TMS-export-format (COLLECT FROM:, DELIVER TO:, WGT:, LDM:, Pickup:, Fix: osv).
function parseBookingFromText(raw) {
  const text = (raw || '').replace(/\r\n/g, '\n');
  const result = {
    fromLocation: '', toLocation: '',
    fromPostal: '', toPostal: '',
    loadDate: '', loadTime: '',
    unloadDate: '', unloadTime: '',
    weight: null, flm: null, pallets: null, price: null,
    adr: false, tailLift: false, openSide: false,
    description: '',
  };

  const normDate = (s) => {
    if (!s) return '';
    s = s.trim();
    let m = s.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (m) return s;
    m = s.match(/^(\d{1,2})[/.\-](\d{1,2})(?:[/.\-](\d{2,4}))?$/);
    if (m) {
      const d = m[1].padStart(2, '0');
      const mo = m[2].padStart(2, '0');
      let y = m[3] || String(new Date().getFullYear());
      if (y.length === 2) y = '20' + y;
      return `${y}-${mo}-${d}`;
    }
    return '';
  };

  // Tid → HH:MM. Stöder "0700", "07:00", "07.00", "0700-1545" (tar första delen).
  const normTime = (s) => {
    if (!s) return '';
    s = s.trim();
    let m = s.match(/^(\d{1,2})[:\.](\d{2})/);
    if (m) return `${m[1].padStart(2, '0')}:${m[2]}`;
    m = s.match(/^(\d{2})(\d{2})\b/); // militärtid 0700
    if (m) return `${m[1]}:${m[2]}`;
    return '';
  };

  // Plocka stad + postnr ur ett textblock. Hanterar "SE-597 91 ÅTVIDABERG" och "11122 STOCKHOLM".
  const extractPostalAndCity = (block) => {
    if (!block) return { postal: '', city: '' };
    // SE-prefix eller bara siffror, följt av stad
    const m1 = block.match(/(?:SE[\s\-]*)?(\d{3}\s?\d{2})\s+([A-ZÅÄÖa-zåäö][A-ZÅÄÖa-zåäö\s\-]{1,30})/);
    if (m1) {
      const city = m1[2].split(/\n/)[0].trim().replace(/[,;].*$/, '').trim();
      return { postal: m1[1].replace(/\s/g, ''), city };
    }
    // Bara postnr
    const m2 = block.match(/(?:SE[\s\-]*)?(\d{3}\s?\d{2})/);
    if (m2) return { postal: m2[1].replace(/\s/g, ''), city: '' };
    return { postal: '', city: '' };
  };

  // Block-baserad extraktion: hämta texten mellan "COLLECT FROM:" / "DELIVER TO:" / "Pickup:" osv.
  const blockBetween = (startRe, endResAlt) => {
    const start = text.search(startRe);
    if (start < 0) return '';
    const after = text.slice(start);
    const startMatch = after.match(startRe);
    const startEnd = start + (startMatch ? startMatch[0].length : 0);
    let earliest = text.length;
    for (const re of endResAlt) {
      const idx = text.slice(startEnd).search(re);
      if (idx >= 0 && (startEnd + idx) < earliest) earliest = startEnd + idx;
    }
    return text.slice(startEnd, earliest).trim();
  };

  // FROM-block (COLLECT FROM / Lastas / Hämtas / Pickup-from / Avsändare / Från)
  const fromStarters = /(?:COLLECT\s*FROM|LASTAS|H[ÄA]MTAS|PICKUP\s*FROM|AVS[ÄA]NDARE|FR[ÅA]N|LASTORT)\s*[:\-]/i;
  const toStarters   = /(?:DELIVER\s*TO|LOSSAS|LEVERERAS|DELIVERY|MOTTAGARE|TILL|LOSSORT|DESTINATION)\s*[:\-]/i;
  const breakers     = [
    toStarters, /(?:^|\n)\s*Pickup\s*:/i, /(?:^|\n)\s*Fix\s*:/i,
    /(?:^|\n)\s*WGT\s*:/i, /(?:^|\n)\s*LDM\s*:/i, /(?:^|\n)\s*Time\s*:/i,
    /(?:^|\n)\s*OrderID/i, /(?:^|\n)\s*Load-Remarks/i, /(?:^|\n)\s*HAZ\s*:/i,
    /(?:^|\n)\s*Cll\s*:/i, /(?:^|\n)\s*Consref/i, /(?:^|\n)\s*Ext\.Ref/i,
    /(?:^|\n)\s*UnLoad-Remarks/i,
  ];
  const fromBlock = blockBetween(fromStarters, breakers);
  const toBlock   = blockBetween(toStarters, breakers.filter(b => b !== toStarters));

  if (fromBlock) {
    const { postal, city } = extractPostalAndCity(fromBlock);
    result.fromPostal = postal;
    result.fromLocation = city;
  }
  if (toBlock) {
    const { postal, city } = extractPostalAndCity(toBlock);
    result.toPostal = postal;
    result.toLocation = city;
  }

  // Fallback: "X → Y" / "X till Y" på en rad
  if (!result.fromLocation || !result.toLocation) {
    const r = text.match(/([A-ZÅÄÖ][A-Za-zÅÄÖåäö\s\-]{1,30}?)\s*(?:->|=>|→|–|—|-|\bto\b|\btill\b)\s*([A-ZÅÄÖ][A-Za-zÅÄÖåäö\s\-]{1,30})/);
    if (r) {
      if (!result.fromLocation) result.fromLocation = r[1].trim();
      if (!result.toLocation) result.toLocation = r[2].trim();
    }
  }

  // Sista utväg på postnr: alla 5-siffriga grupper i ordning
  if (!result.fromPostal || !result.toPostal) {
    const all = [...text.matchAll(/(?:SE[\s\-]*)?\b(\d{3}\s?\d{2})\b/g)].map(m => m[1].replace(/\s/g, ''));
    if (!result.fromPostal && all[0]) result.fromPostal = all[0];
    if (!result.toPostal && all[1]) result.toPostal = all[1];
  }

  // LASTNINGSDAG (Pickup, lastning, lastas, hämtas)
  let dm = text.match(/(?:Pickup|lastning|lastdatum|lastas|h[äa]mtas|upphämtning)\s*[:\-]?\s*(\d{4}-\d{2}-\d{2}|\d{1,2}[/.\-]\d{1,2}(?:[/.\-]\d{2,4})?)/i);
  if (dm) result.loadDate = normDate(dm[1]);

  // LASTNINGSTID — fältet "Time:" i pickup-sektionen, eller normal tid
  // I DHL-format: "Time:0700-1545" → 07:00
  let tm = text.match(/Pickup[^\n]*?\n[^\n]*?Time\s*:\s*(\d{1,2}[:\.]\d{2}|\d{4})/i)
        || text.match(/(?:lastning|lastas|h[äa]mtas|pickup)[^\n]*?(\d{1,2}[:\.]\d{2}|\b\d{4}\b)(?:\s*[-–]\s*\d{4})?/i);
  if (tm) result.loadTime = normTime(tm[1]);

  // LOSSNINGSDAG — Fix: i DHL, eller lossning/levereras
  dm = text.match(/(?:DELIVER\s*TO[\s\S]*?Fix\s*:|Fix\s*:|lossning|lossdatum|lossas|levereras|delivery|leverans)\s*[:\-]?\s*(\d{4}-\d{2}-\d{2}|\d{1,2}[/.\-]\d{1,2}(?:[/.\-]\d{2,4})?)/i);
  if (dm) result.unloadDate = normDate(dm[1]);
  tm = text.match(/(?:DELIVER\s*TO[\s\S]*?Time\s*:|Fix[^\n]*?Time\s*:|lossning|lossas|levereras)[\s:]*?(\d{1,2}[:\.]\d{2}|\b\d{4}\b)/i);
  if (tm && tm[1] !== '-') result.unloadTime = normTime(tm[1]);

  // Fallback: alla datum i ordning
  if (!result.loadDate || !result.unloadDate) {
    const dates = [...text.matchAll(/(\d{4}-\d{2}-\d{2}|\d{1,2}[/.\-]\d{1,2}(?:[/.\-]\d{2,4})?)/g)]
      .map(m => normDate(m[1])).filter(Boolean);
    if (!result.loadDate && dates[0]) result.loadDate = dates[0];
    if (!result.unloadDate && dates[1]) result.unloadDate = dates[1];
  }

  // VIKT (WGT eller "vikt: X kg" eller "X kg")
  let m = text.match(/\bWGT\s*[:\-]?\s*([\d.,]+)/i)
       || text.match(/(?:vikt|weight)\s*[:\-]?\s*([\d.,]+)\s*(?:kg|kilo)?/i)
       || text.match(/([\d.,]+)\s*(?:kg|kilo)\b/i);
  if (m) {
    const v = parseFloat(m[1].replace(/\s/g, '').replace(',', '.'));
    if (!isNaN(v) && v > 0) result.weight = v;
  }

  // FLM / LDM (flakmeter / loading meter)
  m = text.match(/\b(?:flm|ldm|flakmeter|loading\s*meter)\s*[:\-]?\s*([\d.,]+)/i)
   || text.match(/([\d.,]+)\s*\b(?:flm|ldm|flakmeter|lm)\b/i);
  if (m) {
    const v = parseFloat(m[1].replace(/\s/g, '').replace(',', '.'));
    if (!isNaN(v) && v > 0) result.flm = v;
  }

  // ANTAL PALL / Cll (colli)
  m = text.match(/(?:antal\s*pall|pallets?)\s*[:\-]?\s*(\d+)/i)
   || text.match(/\bCll\s*[:\-]?\s*(\d+)/i)
   || text.match(/\b(\d+)\s*(?:st\s*)?(?:pall(?:ar|etter|s)?|colli|kolli)\b/i)
   || text.match(/\bpall\s*[:\-]?\s*(\d+)/i);
  if (m) {
    const v = parseInt(m[1], 10);
    if (!isNaN(v) && v > 0) result.pallets = v;
  }

  // PRIS
  m = text.match(/(?:pris|price|kostnad)\s*[:\-]?\s*([\d\s.,]+)\s*(?:kr|sek)/i)
   || text.match(/([\d\s.,]+)\s*(?:kr|sek)\b/i);
  if (m) {
    const v = parseFloat(m[1].replace(/\s/g, '').replace(',', '.'));
    if (!isNaN(v) && v > 0) result.price = Math.round(v);
  }

  // FORDONSKRAV — DHL har "HAZ: Yes/No" för farligt gods
  result.adr = /\bADR\b/i.test(text) || /\bHAZ\s*:\s*Yes\b/i.test(text);
  result.tailLift = /(bakgavellift|baklift|tail\s*lift)/i.test(text);
  result.openSide = /(öppningsbar|oppningsbar|open\s*side|capell|gardin|sidogardiner)/i.test(text);

  // BESKRIVNING — kombinera ev. nyttig info: ref, remarks osv.
  const descParts = [];
  m = text.match(/(?:beskrivning|kommentar|info|gods|last|Load-Remarks|UnLoad-Remarks)\s*[:\-]\s*([^\n]+)/i);
  if (m && m[1].trim()) descParts.push(m[1].trim());
  m = text.match(/Consref\s*[:\-]?\s*([^\n]+)/i);
  if (m && m[1].trim()) descParts.push('Ref: ' + m[1].trim());
  m = text.match(/Ext\.Ref\s*[:\-]?\s*([^\n]+)/i);
  if (m && m[1].trim()) descParts.push('Ext.Ref: ' + m[1].trim());
  if (descParts.length) result.description = descParts.join(' · ').slice(0, 240);

  return result;
}

async function migrateLegacyRoles() {
  if (localStorage.getItem('legacyRolesMigrated') === '1') return;
  const users = await db.all('users');
  let changed = 0;
  for (const x of users) {
    if (x.role === 'transportkopare') {
      x.role = 'akare';
      await db.put('users', x);
      changed++;
    }
  }
  localStorage.setItem('legacyRolesMigrated', '1');
  if (changed > 0) console.log(`[migrate] Migrerade ${changed} transportkopare → akare`);
}

async function cleanupOrphanedBookings() {
  if (localStorage.getItem('orphanCleanupDone') === '1') return;
  const users = await db.all('users');
  const validIds = new Set(users.map(u => u.id));
  const bookings = await db.all('bookings');
  let removed = 0;
  for (const b of bookings) {
    const buyerMissing = !validIds.has(b.buyerId);
    const haulerMissing = b.haulerId && !validIds.has(b.haulerId);
    if (buyerMissing || haulerMissing) {
      const msgs = await db.byIndex('messages', 'bookingId', b.id);
      for (const m of msgs) await db.del('messages', m.id);
      await db.del('bookings', b.id);
      removed++;
    }
  }
  localStorage.setItem('orphanCleanupDone', '1');
  if (removed > 0) console.log(`[cleanup] Tog bort ${removed} bokningar med ogiltig uppdragsgivare/åkare`);
}

// --------- Prenumerationsmodell ---------
// 1-5 bilar: 995 kr / mån (exkl moms)
// 6-15 bilar: 1 995 kr / mån
// 16-30+ bilar: 2 495 kr / mån
const VAT_RATE = 0.25;
const TRIAL_DAYS = 14;
const DEFAULT_PRICING_TIERS = [
  { min: 1,  max: 5,  price: 995  },
  { min: 6,  max: 15, price: 1995 },
  { min: 16, max: 30, price: 2495 },
];
let PRICING_TIERS = loadPricingTiers();

function loadPricingTiers() {
  try {
    const raw = localStorage.getItem('pricingTiers');
    if (!raw) return DEFAULT_PRICING_TIERS.map(t => ({ ...t }));
    const parsed = JSON.parse(raw);
    if (!Array.isArray(parsed) || parsed.length === 0) return DEFAULT_PRICING_TIERS.map(t => ({ ...t }));
    return parsed.filter(t => t && typeof t.min === 'number' && typeof t.max === 'number' && typeof t.price === 'number');
  } catch { return DEFAULT_PRICING_TIERS.map(t => ({ ...t })); }
}
function savePricingTiers(tiers) {
  const cleaned = tiers
    .map(t => ({ min: Number(t.min), max: Number(t.max), price: Number(t.price) }))
    .filter(t => !isNaN(t.min) && !isNaN(t.max) && !isNaN(t.price) && t.min > 0 && t.max >= t.min && t.price >= 0)
    .sort((a, b) => a.min - b.min);
  if (cleaned.length === 0) throw new Error('Minst en prisnivå krävs');
  localStorage.setItem('pricingTiers', JSON.stringify(cleaned));
  PRICING_TIERS = cleaned;
}
function resetPricingTiers() {
  localStorage.removeItem('pricingTiers');
  PRICING_TIERS = DEFAULT_PRICING_TIERS.map(t => ({ ...t }));
}
function tierFor(vehicleCount) {
  if (!vehicleCount || vehicleCount < 1) return null;
  const t = PRICING_TIERS.find(t => vehicleCount >= t.min && vehicleCount <= t.max);
  return t || PRICING_TIERS[PRICING_TIERS.length - 1]; // 30+ → högsta tariffen
}
function monthlyCostFor(vehicleCount, user) {
  if (user && user.customMonthlyPrice != null && user.customMonthlyPrice >= 0) {
    return Number(user.customMonthlyPrice);
  }
  const t = tierFor(vehicleCount);
  return t ? t.price : 0;
}
function tierLabelFor(vehicleCount) {
  const t = tierFor(vehicleCount);
  if (!t) return 'Ingen bil registrerad';
  return `${t.min}–${t.max === 30 ? '30+' : t.max} bilar`;
}
function trialEndsAt(user) {
  if (!user || !user.createdAt) return 0;
  return user.createdAt + TRIAL_DAYS * 86400000;
}
function trialDaysLeft(user) {
  const end = trialEndsAt(user);
  if (!end) return 0;
  const ms = end - Date.now();
  return Math.max(0, Math.ceil(ms / 86400000));
}
function isTrialActive(user) {
  return trialDaysLeft(user) > 0;
}
function subscriptionStatusFor(user) {
  if (!user) return 'none';
  if (user.subscriptionActive === true) return 'paid';
  if (isTrialActive(user)) return 'trial';
  return 'expired';
}

// Tar bort telefonnummer och e-post från fri text (används i chatt innan accept)
// Anti-kringgående: regex för e-post, telefon, företagsformer, websidor
const COMPANY_RE = /\b(?:[A-ZÅÄÖ][\wÅÄÖåäö&'.\-]{1,}\s+){0,3}(?:AB|Aktiebolag|HB|KB|AS|A\/S|ApS|Oy|Inc|Ltd|GmbH|Åkeri|Transport|Logistik|Speditions?)\b/g;
const URL_RE = /\b(?:https?:\/\/|www\.)\S+|\b[\w-]+\.(?:se|com|net|org|nu|eu|dk|no|fi)\b/gi;
const EMAIL_RE = /\b[\w.+-]+@[\w-]+\.[\w.-]+\b/g;
const PHONE_RE = /(\+?\d[\d\s\-()]{5,}\d)/g;
function detectContact(text, knownNames = []) {
  if (!text) return { hits: [], masked: text };
  let masked = text;
  const hits = [];
  if (EMAIL_RE.test(text))   hits.push('e-post');
  if (PHONE_RE.test(text))   hits.push('telefon');
  if (URL_RE.test(text))     hits.push('webbadress');
  if (COMPANY_RE.test(text)) hits.push('företagsnamn');
  for (const n of knownNames) {
    if (!n) continue;
    const re = new RegExp('\\b' + n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'i');
    if (re.test(text)) { hits.push('namn'); break; }
  }
  // återanvänd regexarna för maskning (måste skapa nya pga global state)
  masked = masked.replace(/\b[\w.+-]+@[\w-]+\.[\w.-]+\b/g, '[***]');
  masked = masked.replace(/(\+?\d[\d\s\-()]{5,}\d)/g, m => m.replace(/\D/g, '').length >= 6 ? '[***]' : m);
  masked = masked.replace(/\b(?:https?:\/\/|www\.)\S+|\b[\w-]+\.(?:se|com|net|org|nu|eu|dk|no|fi)\b/gi, '[***]');
  masked = masked.replace(/\b(?:[A-ZÅÄÖ][\wÅÄÖåäö&'.\-]{1,}\s+){0,3}(?:AB|Aktiebolag|HB|KB|AS|A\/S|ApS|Oy|Inc|Ltd|GmbH|Åkeri|Transport|Logistik|Speditions?)\b/g, '[***]');
  for (const n of knownNames) {
    if (!n) continue;
    const re = new RegExp('\\b' + n.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
    masked = masked.replace(re, '[***]');
  }
  return { hits: [...new Set(hits)], masked };
}
function redactContact(text) { return detectContact(text).masked; }

function toast(msg, type) {
  const host = document.getElementById('toast-host');
  const el = document.createElement('div');
  el.className = 'toast' + (type === 'err' ? ' err' : '');
  el.textContent = msg;
  host.appendChild(el);
  setTimeout(() => el.remove(), 3000);
}

function blobToUrl(blobOrUrl) {
  if (!blobOrUrl) return null;
  if (typeof blobOrUrl === 'string') return blobOrUrl;
  if (blobOrUrl instanceof Blob) return URL.createObjectURL(blobOrUrl);
  return null;
}

// --------- Router (hash-baserad) ---------
const routes = [];
function route(pattern, handler) { routes.push({ pattern, handler }); }

function navigate(path) {
  if (location.hash.slice(1) === path) render();
  else location.hash = path;
}

async function render() {
  const hash = location.hash.slice(1) || '/';
  const user = currentUser();
  _unreadCache = user ? await unreadCount(user.id) : 0;

  // Publika rutter (utan inlogg)
  // Tills vidare (innan lansering) är endast landningssidan och login publika.
  // /register och publika bokningar omdirigeras till landningssidan.
  const publicHashes = ['/', '/login'];
  const isPublicBooking = false;
  if (!user && !publicHashes.includes(hash) && !isPublicBooking) {
    return navigate('/');
  }
  if (user && (hash === '/login' || hash === '/register')) {
    return navigate('/');
  }

  for (const r of routes) {
    const m = hash.match(r.pattern);
    if (m) {
      try { await r.handler(m, user); }
      catch (e) { console.error(e); toast(e.message || 'Fel uppstod', 'err'); }
      return;
    }
  }
  document.getElementById('app').innerHTML = `<main><div class="card"><h2>Sidan hittades inte</h2><a href="#/">Gå till start</a></div></main>`;
}

window.addEventListener('hashchange', render);

// Periodisk koll för nya aviseringar
setInterval(async () => {
  const u = currentUser();
  if (!u) return;
  const count = await unreadCount(u.id);
  if (count !== _unreadCache) {
    _unreadCache = count;
    const oldCount = Number((document.querySelector('header.topbar nav a[href="#/notifications"] span') || {}).textContent) || 0;
    if (count > oldCount) toast(`Du har ${count - oldCount} ny${count - oldCount === 1 ? '' : 'a'} avisering${count - oldCount === 1 ? '' : 'ar'}`);
    render();
  }
}, 15000);

// Sammanslagen dashboard: alla inloggade ser sina egna publicerade + tillgängliga + accepterade
async function unifiedDashboard(u) {
  const allMine = await db.byIndex('bookings', 'buyerId', u.id);
  const accepted = await db.byIndex('bookings', 'haulerId', u.id);
  const open = await db.byIndex('bookings', 'status', 'open');
  const available = open.filter(b => b.buyerId !== u.id);

  applySort(allMine);
  applySort(available);
  accepted.sort((a, b) => (b.acceptedAt || 0) - (a.acceptedAt || 0));

  const sortKey = getSortKey();
  const sortOpts = Object.entries(SORT_OPTIONS).map(([k,v]) => `<option value="${k}" ${k===sortKey?'selected':''}>${v.label}</option>`).join('');

  const myByStatus = { open: [], accepted: [], completed: [] };
  allMine.forEach(b => myByStatus[b.status]?.push(b));

  const accByStatus = { accepted: [], completed: [] };
  accepted.forEach(b => accByStatus[b.status]?.push(b));
  const totalEarned = accByStatus.completed.reduce((s, b) => s + ((b.price || 0) - (b.commission || 0)), 0);

  // Aktiva publicerade (ej utförda) — dessa visas under "Mina publicerade körningar"
  const myActive = allMine.filter(b => b.status !== 'completed');
  // Aktiva accepterade (ej utförda) — dessa visas under "Uppdrag jag accepterat"
  const accAcceptedActive = accepted.filter(b => b.status !== 'completed');
  // Alla utförda (egna publicerade + egna accepterade) — dedupliceras via id
  const completedSet = new Map();
  for (const b of myByStatus.completed) completedSet.set(b.id, b);
  for (const b of accByStatus.completed) completedSet.set(b.id, b);
  const myCompletedAll = [...completedSet.values()].sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));

  // Trial-banner för åkare
  let trialBanner = '';
  if (u.role === 'akare') {
    const fresh = await db.get('users', u.id);
    const status = subscriptionStatusFor(fresh);
    const days = trialDaysLeft(fresh);
    if (status === 'trial') {
      trialBanner = `<div class="banner info">🎁 Du har <b>${days} ${days === 1 ? 'dag' : 'dagar'} kvar</b> av din kostnadsfria provperiod (14 dagar). <a href="#/subscription">Se prislista →</a></div>`;
    } else if (status === 'expired') {
      trialBanner = `<div class="banner err">⚠ Din provperiod har gått ut. <a href="#/subscription">Aktivera prenumeration →</a></div>`;
    }
  }

  mount(`
    <h2>Hej ${esc(u.name)}!</h2>
    ${trialBanner}
    <div class="btn-row">
      <a class="btn" href="#/new">➕ Skapa ny körning</a>
      ${allMine.some(b => b.sourceRef) ? `<button class="btn danger" id="clearImportedBtn" style="margin:0">🗑 Rensa importerade (${allMine.filter(b => b.sourceRef).length})</button>` : ''}
      <label class="btn secondary" style="margin:0;display:inline-flex;align-items:center;gap:8px;cursor:pointer">
        ↕ Sortera:
        <select id="sortSelect" style="border:none;background:transparent;color:inherit;font:inherit;cursor:pointer">${sortOpts}</select>
      </label>
    </div>
    <div class="stats">
      <a class="stat" href="#/mine/open" style="text-decoration:none;color:inherit;cursor:pointer"><div class="val">${myByStatus.open.length}</div><div class="lbl">Mina öppna</div></a>
      <a class="stat" href="#/mine/active" style="text-decoration:none;color:inherit;cursor:pointer"><div class="val">${myByStatus.accepted.length + accByStatus.accepted.length}</div><div class="lbl">Pågående uppdrag</div></a>
      <a class="stat" href="#/mine/completed" style="text-decoration:none;color:inherit;cursor:pointer"><div class="val">${myCompletedAll.length}</div><div class="lbl">Mina utförda</div></a>
      <a class="stat" href="#/mine/earned" style="text-decoration:none;color:inherit;cursor:pointer"><div class="val">${fmtMoney(totalEarned)}</div><div class="lbl">Netto utförda</div></a>
    </div>

    <div class="card">
      <h3>📋 Tillgängliga körningar (${available.length})</h3>
      <div class="muted" style="margin-bottom:8px">Acceptera ett uppdrag — kontaktuppgifter visas efter accept.</div>
      ${available.length === 0 ? `<div class="empty">Inga öppna körningar från andra just nu.</div>` : renderBookingTable(available, 'hauler')}
    </div>

    <div class="card">
      <h3>📝 Mina publicerade körningar (${myActive.length})</h3>
      <div class="muted" style="margin-bottom:8px;font-size:12px">Aktuella uppdrag (öppna och pågående). Utförda hamnar längre ner.</div>
      ${myActive.length === 0 ? `<div class="empty">Du har inga aktiva publicerade körningar.</div>` : renderBookingTable(myActive, 'buyer')}
    </div>

    ${accAcceptedActive.length > 0 ? `<div class="card">
      <h3>🚛 Uppdrag jag accepterat (${accAcceptedActive.length})</h3>
      ${renderBookingTable(accAcceptedActive, 'hauler')}
    </div>` : ''}
  `);
  bindRowClicks();
  bindClearImported(u);
  const ss = document.getElementById('sortSelect');
  if (ss) ss.onchange = () => { setSortKey(ss.value); unifiedDashboard(u); };
}

  let perspective = 'buyer';

  if (filter === 'open') {
    list = allMine.filter(b => b.status === 'open');
    title = '📂 Mina öppna körningar';
    helper = 'Körningar du publicerat och som väntar på åkare.';
    list.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  } else if (filter === 'active') {
    const myPending = allMine.filter(b => b.status === 'accepted');
    const accPending = accepted.filter(b => b.status === 'accepted');
    const seen = new Map();
    for (const b of [...myPending, ...accPending]) seen.set(b.id, b);
    list = [...seen.values()].sort((a, b) => (b.acceptedAt || 0) - (a.acceptedAt || 0));
    title = '🚛 Pågående uppdrag';
    helper = 'Accepterade uppdrag som ännu inte är slutförda — både dina publicerade och de du själv kör.';
  } else if (filter === 'completed') {
    const myDone = allMine.filter(b => b.status === 'completed');
    const accDone = accepted.filter(b => b.status === 'completed');
    const seen = new Map();
    for (const b of [...myDone, ...accDone]) seen.set(b.id, b);
    list = [...seen.values()].sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));
    title = '✅ Mina utförda körningar';
    helper = 'Körningar du publicerat eller utfört som markerats som klara.';
  } else if (filter === 'earned') {
    list = accepted.filter(b => b.status === 'completed');
    list.sort((a, b) => (b.completedAt || 0) - (a.completedAt || 0));
    title = '💰 Netto utförda (intjänat)';
    const total = list.reduce((s, b) => s + ((b.price || 0) - (b.commission || 0)), 0);
    helper = `Totalt intjänat: <b>${fmtMoney(total)}</b> från ${list.length} utförd${list.length === 1 ? '' : 'a'} uppdrag som åkare.`;
    perspective = 'hauler';
  }

  mount(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <a href="#/" class="btn secondary">← Tillbaka till dashboard</a>
      <h2 style="margin:0">${title}</h2>
    </div>
    <div class="muted" style="margin-bottom:12px">${helper}</div>
    <div class="card">
      ${list.length === 0 ? `<div class="empty">Inga körningar i denna kategori.</div>` : renderBookingTable(list, perspective)}
    </div>
  `);
  bindRowClicks();
});

const SORT_OPTIONS = {
  'from-asc':  { label: 'Avgångsort A–Ö', fn: (a,b,c) => c.compare(a.fromLocation||'', b.fromLocation||'') },
  'from-desc': { label: 'Avgångsort Ö–A', fn: (a,b,c) => c.compare(b.fromLocation||'', a.fromLocation||'') },
  'to-asc':    { label: 'Mål-ort A–Ö',    fn: (a,b,c) => c.compare(a.toLocation||'', b.toLocation||'') },
  'date-asc':  { label: 'Lastdatum ↑',    fn: (a,b) => (a.loadDate||'9999').localeCompare(b.loadDate||'9999') },
  'date-desc': { label: 'Lastdatum ↓',    fn: (a,b) => (b.loadDate||'0').localeCompare(a.loadDate||'0') },
  'price-desc':{ label: 'Pris (högst)',   fn: (a,b) => (b.price||0) - (a.price||0) },
  'recent':    { label: 'Senast skapad',  fn: (a,b) => b.createdAt - a.createdAt },
};
function getSortKey() { return localStorage.getItem('sortKey') || 'from-asc'; }
function setSortKey(k) { localStorage.setItem('sortKey', k); }
function applySort(list) {
  const key = getSortKey();
  const cfg = SORT_OPTIONS[key] || SORT_OPTIONS['from-asc'];
  const coll = new Intl.Collator('sv', { sensitivity: 'base' });
  list.sort((a, b) => cfg.fn(a, b, coll));
  return list;
}

async function buyerDashboard(u) {
  const all = await db.byIndex('bookings', 'buyerId', u.id);
  applySort(all);

  const byStatus = { open: [], accepted: [], completed: [] };
  all.forEach(b => byStatus[b.status].push(b));

  const sortKey = getSortKey();
  const sortOpts = Object.entries(SORT_OPTIONS).map(([k,v]) => `<option value="${k}" ${k===sortKey?'selected':''}>${v.label}</option>`).join('');

  mount(`
    <h2>Mina körningar</h2>
    <div class="btn-row">
      <a class="btn" href="#/new">➕ Skapa ny körning</a>
      ${all.some(b => b.sourceRef) ? `<button class="btn danger" id="clearImportedBtn" style="margin:0">🗑 Rensa importerade (${all.filter(b => b.sourceRef).length})</button>` : ''}
      <label class="btn secondary" style="margin:0;display:inline-flex;align-items:center;gap:8px;cursor:pointer">
        ↕ Sortera:
        <select id="sortSelect" style="border:none;background:transparent;color:inherit;font:inherit;cursor:pointer">${sortOpts}</select>
      </label>
    </div>
    <div class="stats">
      <div class="stat"><div class="val">${byStatus.open.length}</div><div class="lbl">Öppna</div></div>
      <div class="stat"><div class="val">${byStatus.accepted.length}</div><div class="lbl">Accepterade</div></div>
      <div class="stat"><div class="val">${byStatus.completed.length}</div><div class="lbl">Utförda</div></div>
      <div class="stat"><div class="val">${fmtMoney(byStatus.completed.reduce((s, b) => s + b.price, 0))}</div><div class="lbl">Summa (utförda)</div></div>
    </div>
    <div class="card">
      ${all.length === 0
        ? `<div class="empty">Du har inga körningar ännu. <a href="#/new">Skapa din första</a></div>`
        : renderBookingTable(all, 'buyer')}
    </div>

  bindRowClicks();

function bindClearImported(u) {
  const btn = document.getElementById('clearImportedBtn');
  if (!btn) return;
  btn.onclick = async () => {
    const mine = await db.byIndex('bookings', 'buyerId', u.id);
    const imported = mine.filter(b => b.sourceRef);
    if (!imported.length) return;
    if (!confirm(`Ta bort ${imported.length} importerade körningar permanent?`)) return;
    let n = 0;
    for (const b of imported) {
      const msgs = await db.byIndex('messages', 'bookingId', b.id);
      for (const m of msgs) await db.del('messages', m.id);
      await db.del('bookings', b.id);
      n++;
    }
    toast(`Rensade ${n} importerade körningar`);
    location.hash = '#/';
  };
}

  };
  document.getElementById('aiParseBtn').onclick = () => {
    const txt = document.getElementById('aiPasteText').value;
    if (!txt.trim()) { document.getElementById('aiResult').textContent = 'Klistra in text först.'; return; }
    const parsed = parseBookingFromText(txt);
    const form = document.getElementById('newForm');
    let filled = [];
    const set = (name, val) => {
      if (val == null || val === '') return;
      const el = form.elements[name];
      if (!el) return;
      if (el.type === 'checkbox') {
        if (val) { el.checked = true; filled.push(name); }
      } else {
        el.value = val;
        filled.push(name);
      }
    };

    set('toLocation', parsed.toLocation);

    set('tailLift', parsed.tailLift);
    set('openSide', parsed.openSide);
    set('description', parsed.description);
    document.getElementById('aiResult').textContent = filled.length

      : '⚠ Kunde inte tolka texten. Fyll i manuellt.';
  };

  document.getElementById('newForm').onsubmit = async e => {
    e.preventDefault();
    try {
      const f = new FormData(e.target);
      const file = f.get('bookingImage');
      let bookingImageUrl = null;
      if (file && file.size > 0) {
        bookingImageUrl = await uploadImage(file, 'booking-images');
      }

        buyerId: u.id, haulerId: null,
        fromLocation: f.get('fromLocation').trim(),
        toLocation: f.get('toLocation').trim(),
        fromPostal: (f.get('fromPostal') || '').trim(),
        toPostal: (f.get('toPostal') || '').trim(),
        weight: f.get('weight') ? Number(f.get('weight')) : null,
        flm: f.get('flm') ? Number(f.get('flm')) : null,
        pallets: f.get('pallets') ? Number(f.get('pallets')) : null,
        loadDate: f.get('loadDate'), loadTime: f.get('loadTime') || null,
        unloadDate: f.get('unloadDate'), unloadTime: f.get('unloadTime') || null,
        adr: !!f.get('adr'), tailLift: !!f.get('tailLift'), openSide: !!f.get('openSide'),
        price: f.get('price') ? Number(f.get('price')) : null,
        description: (f.get('description') || '').trim(),
        bookingImageUrl,
        status: 'open', commission: 0,
        contactVisible: false,
      };
      const saved = await db.add('bookings', booking);
      toast('Körning publicerad');
      navigate('/booking/' + saved.id);
    } catch (err) {
      console.error('Skapa körning fel:', err);
      toast('Kunde inte publicera: ' + (err.message || err), 'err');
    }
  };
});

route(/^\/free-vehicles$/, async (_m, u) => {

  const all = await db.all('freeVehicles');
  const active = all.filter(x => x.status !== 'archived');
  active.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));
  const users = {};
  const vehiclesById = {};
  for (const fv of active) {
    if (!users[fv.haulerId]) users[fv.haulerId] = await db.get('users', fv.haulerId);
    if (fv.vehicleId && !vehiclesById[fv.vehicleId]) vehiclesById[fv.vehicleId] = await db.get('vehicles', fv.vehicleId);
  }
  mount(`
    <h2>🚚 Lediga bilar (${active.length})</h2>

      ${canAcceptAndPost(u) ? `<a class="btn" href="#/free-vehicles/new">➕ Lägg till ledig bil</a>` : ''}

    <div class="card">
      ${active.length === 0 ? `<div class="empty">Inga lediga bilar just nu.</div>`
      : `<table class="compact">
          <thead><tr><th>Rutt</th><th>Fordon</th><th>Egenskaper</th><th>Tillgänglig</th><th>Åkare</th><th>Kommentar</th><th></th></tr></thead>

            const owner = users[fv.haulerId];

            const linkedVeh = fv.vehicleId ? vehiclesById[fv.vehicleId] : null;
            const flm = (fv.freeFlm != null && fv.freeFlm !== '') ? `${esc(fv.freeFlm)} FLM` : '';
            const vehTop = linkedVeh ? `<b>${esc(linkedVeh.regNr || '')}</b>` : '<span class="muted">—</span>';
            const vehSub = [linkedVeh?.model, flm].filter(Boolean).map(esc).join(' · ');
            const features = [
              fv.adr ? '<span class="badge feature">ADR</span>' : '',
              fv.tailLift ? '<span class="badge feature">Lift</span>' : '',
              fv.openSide ? '<span class="badge feature">Öpp.sida</span>' : '',
              fv.reefer ? '<span class="badge feature">Kyl/Frys</span>' : '',
            ].filter(Boolean).join('');
            const avail = [fv.availableFrom, fv.availableTime].filter(Boolean).join(' ') || '—';
            return `<tr>
              <td><b>${esc(fv.currentLocation || '—')}</b> → ${dest}</td>
              <td>${vehTop}${vehSub ? '<br><span class="muted" style="font-size:11px">' + vehSub + '</span>' : ''}</td>
              <td>${features || '<span class="muted">—</span>'}</td>
              <td class="nowrap">${esc(avail)}</td>
              <td>${owner ? esc(owner.company || owner.name) : '—'}<br><span class="muted" style="font-size:11px">${owner ? esc(owner.phone || owner.email) : ''}</span></td>
              <td style="font-size:12px">${esc(fv.comment || '')}</td>
              <td class="nowrap">${isMine || u.role === 'admin'
                ? `<a class="btn secondary icon-btn" href="#/free-vehicles/${fv.id}/edit" title="Ändra">✏️</a>
                   <button class="danger icon-btn" data-delfv="${fv.id}" title="Ta bort">🗑</button>`
                : ''}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table>`}
    </div>
  `);
  document.querySelectorAll('button[data-delfv]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Ta bort den lediga bilen?')) return;
      await db.del('freeVehicles', btn.dataset.delfv);

function bindFreeVehicleForm(u, fv) {
  const anyCb = document.querySelector('input[name="anywhere"]');
  const destField = document.getElementById('destField');
  const updateDest = () => { destField.style.display = anyCb.checked ? 'none' : ''; };
  anyCb.onchange = updateDest; updateDest();
  document.getElementById('fvForm').onsubmit = async e => {
    e.preventDefault();
    const f = new FormData(e.target);
    const anywhere = !!f.get('anywhere');
    const destination = (f.get('destination') || '').trim();
    if (!anywhere && !destination) { toast('Ange destination eller kryssa "Kan åka vart som helst"', 'err'); return; }
    const data = {
      haulerId: fv ? fv.haulerId : u.id,
      currentLocation: (f.get('currentLocation') || '').trim(),
      availableFrom: f.get('availableFrom') || '',
      availableTime: f.get('availableTime') || '',
      anywhere,
      destination: anywhere ? '' : destination,
      vehicleId: f.get('vehicleId') ? Number(f.get('vehicleId')) : null,
      freeFlm: f.get('freeFlm') ? Number(f.get('freeFlm')) : null,
      adr: !!f.get('adr'),
      tailLift: !!f.get('tailLift'),
      openSide: !!f.get('openSide'),
      reefer: !!f.get('reefer'),
      comment: (f.get('comment') || '').trim(),
      status: 'available',
      createdAt: fv ? fv.createdAt : Date.now(),
      updatedAt: Date.now(),
    };
    if (fv) { data.id = fv.id; await db.put('freeVehicles', data); toast('Sparad'); }
    else { await db.add('freeVehicles', data); toast('Publicerad'); }
    navigate('/free-vehicles');
  };
}

      email,

  const bookings = await db.all('bookings');

  bookings.forEach(b => {
    b._buyerName = byId[b.buyerId]?.name;
    b._haulerName = b.haulerId ? byId[b.haulerId]?.name : null;
  });
  bookings.sort((a, b) => b.createdAt - a.createdAt);

  const totalCommission = bookings.filter(b => b.status === 'completed').reduce((s, b) => s + b.commission, 0);
  const pendingCommission = bookings.filter(b => b.status === 'accepted').reduce((s, b) => s + b.commission, 0);

  mount(`
    <h2>Admin — översikt</h2>

function bindUserForm(target) {
  const isNew = !target;
  document.getElementById('userForm').onsubmit = async e => {
    e.preventDefault();
    try {
      const f = new FormData(e.target);
      const email = (f.get('email') || '').toLowerCase().trim();
      if (!email) { toast('E-post krävs', 'err'); return; }

      // Om ny eller email ändrad — kolla duplicat
      if (isNew || email !== target.email) {
        const existing = await db.oneByIndex('users', 'email', email);
        if (existing && (!target || existing.id !== target.id)) {
          toast('E-postadressen är redan registrerad', 'err');
          return;
        }
      }

      const data = target ? { ...target } : { createdAt: Date.now() };
      data.email = email;
      data.name = (f.get('name') || '').trim();
      data.role = f.get('role');
      data.phone = (f.get('phone') || '').trim();
      data.company = (f.get('company') || '').trim();
      data.orgNr = (f.get('orgNr') || '').trim();
      data.address = (f.get('address') || '').trim();
      data.contactPerson = (f.get('contactPerson') || '').trim();
      data.bankgiro = (f.get('bankgiro') || '').trim();
      data.plusgiro = (f.get('plusgiro') || '').trim();
      data.subscriptionActive = !!f.get('subscriptionActive');

      const customPrice = f.get('customMonthlyPrice');
      data.customMonthlyPrice = (customPrice && Number(customPrice) > 0) ? Number(customPrice) : null;

      // Trial end: räkna tillbaka till createdAt så befintliga helpers fungerar
      const trialEndDate = f.get('trialEndDate');
      if (trialEndDate) {
        data.createdAt = new Date(trialEndDate).getTime() - TRIAL_DAYS * 86400000;
      }

      // Lösenord
      const pwd = f.get('pwd');
      if (pwd) {
        data.passwordHash = await hashPwd(pwd);
      } else if (isNew) {
        toast('Lösenord krävs för ny användare', 'err');
        return;
      }

      if (isNew) {
        await db.add('users', data);
        toast(`Användare ${data.name} skapad`);
      } else {
        await db.put('users', data);
        toast('Ändringar sparade');
      }
      navigate('/users');
    } catch (err) {
      console.error('Spara användare-fel:', err);
      toast('Fel: ' + (err.message || err), 'err');
    }
  };
}

// --------- Statistik (åkare) ---------
function periodRange(period, ref = new Date()) {
  const d = new Date(ref);
  let from, to = new Date(d.getFullYear(), d.getMonth(), d.getDate(), 23, 59, 59, 999);
  if (period === 'week') {
    const day = (d.getDay() + 6) % 7; // måndag = 0
    from = new Date(d.getFullYear(), d.getMonth(), d.getDate() - day);
  } else if (period === 'month') {
    from = new Date(d.getFullYear(), d.getMonth(), 1);
  } else if (period === 'year') {
    from = new Date(d.getFullYear(), 0, 1);
  } else {
    from = new Date(0);
  }
  return { from: from.getTime(), to: to.getTime() };
}

route(/^\/stats$/, async (_m, u) => {
  if (!u || u.role === 'chauffor') return navigate('/');
  const params = new URLSearchParams((location.hash.split('?')[1]) || '');
  const period = params.get('period') || 'month';
  const customFrom = params.get('from');
  const customTo = params.get('to');
  let range;
  if (customFrom && customTo) {
    range = { from: new Date(customFrom).getTime(), to: new Date(customTo).getTime() + 86400000 - 1 };
  } else {
    range = periodRange(period);
  }
  const inRange = (ts) => ts && ts >= range.from && ts <= range.to;

  const myPublished = await db.byIndex('bookings', 'buyerId', u.id);
  const myAccepted = await db.byIndex('bookings', 'haulerId', u.id);

  const publishedInRange = myPublished.filter(b => inRange(b.createdAt));
  const acceptedInRange  = myAccepted.filter(b => inRange(b.acceptedAt));
  const completedInRange = myAccepted.filter(b => b.status === 'completed' && inRange(b.completedAt));

  const omsattning   = completedInRange.reduce((s, b) => s + (b.price || 0), 0);
  const provBetald   = completedInRange.reduce((s, b) => s + (b.commission || 0), 0);
  const netto        = omsattning - provBetald;

  const periodOpts = ['week','month','year','all']
    .map(p => `<option value="${p}" ${p===period?'selected':''}>${({week:'Denna vecka',month:'Denna månad',year:'Detta år',all:'Allt'})[p]}</option>`).join('');

  mount(`

      <form id="statsForm" class="btn-row" style="align-items:center">
        <label class="muted">Period:</label>

      <div class="stat"><div class="val">${publishedInRange.length}</div><div class="lbl">Publicerade uppdrag</div></div>
      <div class="stat"><div class="val">${acceptedInRange.length}</div><div class="lbl">Accepterade uppdrag</div></div>
      <div class="stat"><div class="val">${completedInRange.length}</div><div class="lbl">Utförda uppdrag</div></div>
      <div class="stat"><div class="val">${fmtMoney(omsattning)}</div><div class="lbl">Omsättning</div></div>
      ${canSeeCommission(u) ? `<div class="stat"><div class="val">${fmtMoney(provBetald)}</div><div class="lbl">Provision (betald)</div></div>
      <div class="stat"><div class="val">${fmtMoney(netto)}</div><div class="lbl">Netto efter provision</div></div>` : ''}
    </div>
    <div class="card">
      <h3>Utförda uppdrag i perioden</h3>
      ${completedInRange.length === 0 ? `<div class="empty">Inga utförda uppdrag i vald period.</div>` : `<table>
        <thead><tr><th>Datum</th><th>Från → Till</th><th>Pris</th>${canSeeCommission(u) ? '<th>Provision</th><th>Netto</th>' : ''}</tr></thead>
        <tbody>${completedInRange.sort((a,b)=>(b.completedAt||0)-(a.completedAt||0)).map(b => `<tr>
          <td>${fmtDate(b.completedAt)}</td>
          <td><b>${esc(b.fromLocation)}</b> → <b>${esc(b.toLocation)}</b></td>
          <td>${fmtMoney(b.price)}</td>
          ${canSeeCommission(u) ? `<td>${fmtMoney(b.commission)}</td>
          <td>${fmtMoney((b.price||0)-(b.commission||0))}</td>` : ''}
        </tr>`).join('')}</tbody>
      </table>`}
    </div>
  `);
  document.getElementById('statsForm').onsubmit = e => {
    e.preventDefault();
    const f = new FormData(e.target);
    const p = new URLSearchParams();
    const fromV = f.get('from'), toV = f.get('to');
    if (fromV && toV) { p.set('from', fromV); p.set('to', toV); }
    else p.set('period', f.get('period'));
    location.hash = '#/stats?' + p.toString();
  };
});

route(/^\/admin\/pricing$/, async (_m, u) => {

      <div class="card">
        <table id="tiersTable">
          <thead><tr><th>Min antal bilar</th><th>Max antal bilar</th><th>Pris/månad (kr exkl moms)</th><th>Inkl moms</th><th></th></tr></thead>
          <tbody>

              <td><input type="number" min="1" step="1" name="max" value="${esc(t.max)}" style="width:90px"></td>
              <td><input type="number" min="0" step="1" name="price" value="${esc(t.price)}" style="width:120px"> kr</td>
              <td class="muted">${fmtMoney(t.price * (1 + VAT_RATE))}</td>
              <td><button class="danger icon-btn" data-deltier="${i}" title="Ta bort">🗑</button></td>
            </tr>`).join('')}
          </tbody>
        </table>
        <div class="btn-row" style="margin-top:12px">
          <button id="addTierBtn" class="secondary">➕ Lägg till prisnivå</button>
          <button id="saveTiersBtn" class="ok">💾 Spara prislista</button>
          <button id="resetTiersBtn" class="danger">↺ Återställ till standard</button>
        </div>
        <p class="muted" style="margin-top:12px;font-size:12px">Standardvärden: ${DEFAULT_PRICING_TIERS.map(t => `${t.min}–${t.max} bilar: ${fmtMoney(t.price)}/mån`).join(' · ')}</p>
      </div>
    `);

    document.getElementById('addTierBtn').onclick = () => {
      const lastMax = PRICING_TIERS.length > 0 ? PRICING_TIERS[PRICING_TIERS.length - 1].max : 0;
      PRICING_TIERS = [...PRICING_TIERS, { min: lastMax + 1, max: lastMax + 5, price: 0 }];
      renderEditor();
    };

    document.querySelectorAll('button[data-deltier]').forEach(btn => {
      btn.onclick = () => {
        const i = Number(btn.dataset.deltier); // index i pricing-arrayen, fortfarande nummer
        PRICING_TIERS = PRICING_TIERS.filter((_, j) => j !== i);
        if (PRICING_TIERS.length === 0) PRICING_TIERS = [{ min: 1, max: 5, price: 0 }];
        renderEditor();
      };
    });

    document.getElementById('saveTiersBtn').onclick = () => {
      try {
        const rows = document.querySelectorAll('#tiersTable tbody tr');
        const newTiers = [...rows].map(tr => ({
          min: Number(tr.querySelector('input[name="min"]').value),
          max: Number(tr.querySelector('input[name="max"]').value),
          price: Number(tr.querySelector('input[name="price"]').value),
        }));
        // Validering
        for (let i = 0; i < newTiers.length; i++) {
          const t = newTiers[i];
          if (isNaN(t.min) || isNaN(t.max) || isNaN(t.price)) throw new Error(`Rad ${i+1}: alla fält måste vara nummer`);
          if (t.min < 1 || t.max < t.min) throw new Error(`Rad ${i+1}: min måste vara ≥ 1 och max ≥ min`);
          if (t.price < 0) throw new Error(`Rad ${i+1}: pris kan inte vara negativt`);
        }
        // Kolla att intervallen inte överlappar
        const sorted = [...newTiers].sort((a, b) => a.min - b.min);
        for (let i = 1; i < sorted.length; i++) {
          if (sorted[i].min <= sorted[i-1].max) throw new Error(`Intervallerna överlappar mellan ${sorted[i-1].min}-${sorted[i-1].max} och ${sorted[i].min}-${sorted[i].max}`);
        }
        savePricingTiers(newTiers);
        toast('Prislistan sparad');
        renderEditor();
      } catch (err) {
        toast('Fel: ' + err.message, 'err');
      }
    };

    document.getElementById('resetTiersBtn').onclick = () => {
      if (!confirm('Återställ prislistan till standardvärden?\n\n' + DEFAULT_PRICING_TIERS.map(t => `${t.min}–${t.max} bilar: ${t.price} kr/mån`).join('\n'))) return;
      resetPricingTiers();
      toast('Prislistan återställd');
      renderEditor();
    };
  };
  renderEditor();
});

      const target = await db.get('users', uid);
      target.subscriptionActive = true;

      await db.put('users', target);

      const uid = btn.dataset.deactivate;

      const target = await db.get('users', uid);
      target.subscriptionActive = false;

      toast(`Prenumeration pausad för ${target.name}`);
      navigate('/settlement');

    btn.onclick = () => {
      const uid = btn.dataset.uid;

route(/^\/admin\/subscriptions\/(all|trial|paid|expired|revenue)$/, async (m, u) => {
  if (!u || u.role !== 'admin') return navigate('/');
  const filter = m[1];

  const allUsers = await db.all('users');
  const haulers = allUsers.filter(x => x.role === 'akare');
  const allVehicles = await db.all('vehicles');

  let rows = await Promise.all(haulers.map(async h => {
    const count = allVehicles.filter(v => v.haulerId === h.id).length;
    const status = subscriptionStatusFor(h);
    const daysLeft = trialDaysLeft(h);
    const cost = monthlyCostFor(count, h);
    return { hauler: h, vehicleCount: count, status, daysLeft, cost, tier: tierLabelFor(count) };
  }));

  let title = '';
  let helper = '';
  if (filter === 'all') {
    title = '👥 Alla åkare';
    helper = `Översikt över samtliga ${rows.length} registrerade åkare.`;
  } else if (filter === 'trial') {
    rows = rows.filter(r => r.status === 'trial');
    rows.sort((a, b) => a.daysLeft - b.daysLeft);
    title = '🎁 Åkare på provperiod';
    helper = `Åkare i sin kostnadsfria 14-dagarsperiod. Sorterade efter färst dagar kvar.`;
  } else if (filter === 'paid') {
    rows = rows.filter(r => r.status === 'paid');
    title = '✅ Aktiva prenumeranter';
    helper = `Betalande prenumeranter.`;
  } else if (filter === 'expired') {
    rows = rows.filter(r => r.status === 'expired');
    title = '⚠ Utgångna prenumerationer';
    helper = `Provperioden har gått ut och kontot är inte aktiverat. Aktivera via redigeringsknappen.`;
  } else if (filter === 'revenue') {
    rows = rows.filter(r => r.status === 'paid');
    rows.sort((a, b) => b.cost - a.cost);
    const total = rows.reduce((s, r) => s + r.cost, 0);
    const totalInkl = total * (1 + VAT_RATE);
    title = '💰 Månadsintäkt — fördelning';
    helper = `Total: <b>${fmtMoney(total)}</b> exkl moms / <b>${fmtMoney(totalInkl)}</b> inkl moms. Sorterade efter högsta avgift först.`;
  }

  const statusBadge = s => ({
    trial:   `<span class="badge open">PROVPERIOD</span>`,

    expired: '<span class="badge completed">UTGÅNGEN</span>',
    none:    '<span class="muted">—</span>',
  })[s] || '';

  mount(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <a href="#/settlement" class="btn secondary">← Tillbaka</a>
      <h2 style="margin:0">${title}</h2>
    </div>
    <div class="muted" style="margin-bottom:12px">${helper}</div>
    <div class="card">
      ${rows.length === 0 ? `<div class="empty">Inga åkare i denna kategori.</div>` : `<table class="compact">
        <thead><tr>
          <th>Åkare</th>
          <th>Företag</th>
          <th>E-post</th>
          <th>Telefon</th>
          <th>Antal bilar</th>
          <th>Tariff</th>
          <th>Månadsavgift</th>
          <th>Status</th>
          <th>${filter === 'trial' ? 'Dagar kvar' : 'Provperiod slut'}</th>
          <th></th>
        </tr></thead>
        <tbody>${rows.map(r => `<tr>
          <td><b>${esc(r.hauler.name)}</b></td>
          <td>${esc(r.hauler.company || '—')}</td>
          <td>${esc(r.hauler.email)}</td>
          <td>${esc(r.hauler.phone || '—')}</td>
          <td style="text-align:center">${r.vehicleCount}</td>
          <td>${r.tier}</td>
          <td><b>${r.cost > 0 ? fmtMoney(r.cost) + ' /mån' : '<span class="muted">—</span>'}</b><br><span class="muted" style="font-size:11px">+ moms = ${fmtMoney(r.cost * (1 + VAT_RATE))}</span></td>
          <td>${statusBadge(r.status)}</td>
          <td class="nowrap">${filter === 'trial' ? `<b>${r.daysLeft} dagar</b>` : (r.hauler.createdAt ? new Date(trialEndsAt(r.hauler)).toLocaleDateString('sv-SE') : '—')}</td>
          <td class="nowrap">
            <a class="btn secondary icon-btn" href="#/users/${r.hauler.id}/edit" title="Redigera">✏️</a>
            ${r.cost > 0 ? `<button class="btn secondary icon-btn print-inv" data-uid="${r.hauler.id}" title="Skapa faktura">📄</button>` : ''}
          </td>
        </tr>`).join('')}</tbody>
      </table>`}
    </div>
  `);
  document.querySelectorAll('.print-inv').forEach(btn => {
    btn.onclick = () => {
      const uid = btn.dataset.uid;
      const r = rows.find(x => x.hauler.id === uid);
      if (!r) return;
      openSubscriptionInvoice(r);
    };
  });
});

// --------- Bokningsdetalj (köpare / åkare / admin) ---------
route(/^\/booking\/([\w-]+)$/, async (m, u) => {
  const id = m[1];
  const b = await db.get('bookings', id);
  if (!b) { toast('Bokningen finns inte', 'err'); return navigate('/'); }

  let buyer = await db.get('users', b.buyerId);
  if (!buyer) {
    // Bokningen har en föråldrad uppdragsgivare (t.ex. från tidigare seed). Använd en placeholder.
    buyer = { id: b.buyerId, name: '(borttagen användare)', email: '', phone: '', company: '' };
  }
  let hauler = b.haulerId ? await db.get('users', b.haulerId) : null;
  if (b.haulerId && !hauler) {
    hauler = { id: b.haulerId, name: '(borttagen åkare)', email: '', phone: '', company: '' };
  }

  // Access-regler
  const isBuyer = u && u.id === b.buyerId;
  const isAssignedHauler = u && hauler && u.id === hauler.id;
  const isOtherHauler = u && canAcceptAndPost(u) && !isBuyer && !isAssignedHauler;
  const isAdmin = u && u.role === 'admin';
  let isDriver = false;
  if (u && u.role === 'chauffor') {
    const drv = await db.oneByIndex('drivers', 'email', u.email);
    isDriver = !!(drv && b.driverId === drv.id);
    if (!isDriver) { toast('Du är inte tilldelad denna körning', 'err'); return navigate('/'); }
  }

  if (!u) {
    if (b.status !== 'open') { toast('Logga in för att se denna körning', 'err'); return navigate('/login'); }
    return renderBookingDetail(b, buyer, null, null, { isBuyer:false, isAssignedHauler:false, isOtherHauler:false, isAdmin:false, isDriver:false, isPublic:true });
  }

  if (!isBuyer && !isAdmin && !isDriver && !canAcceptAndPost(u)) {
    toast('Ingen åtkomst', 'err'); return navigate('/');
  }
  // Övriga inloggade kan se öppna och sina egna; inte andras accepterade
  if (!isBuyer && !isAdmin && b.status !== 'open' && !isAssignedHauler) {
    toast('Bokningen är inte längre tillgänglig', 'err'); return navigate('/');
  }

  try {
    await renderBookingDetail(b, buyer, hauler, u, { isBuyer, isAssignedHauler, isOtherHauler, isAdmin, isDriver });
  } catch (err) {
    console.error('Booking detail-fel:', err);
    document.getElementById('app').innerHTML = layout(`<div class="banner err">Kunde inte visa bokningen: ${esc(err.message || String(err))}</div><a class="btn" href="#/">← Tillbaka</a>`);
  }
});

              <td class="muted" style="font-size:12px">${esc(history)}</td>
