                <button class="ok" data-acceptbid="${bd.id}">✓ Acceptera ${fmtMoney(last)}</button>
                <input type="number" min="1" step="1" data-counter-input="${bd.id}" placeholder="Motbud" style="width:110px;margin-left:6px">
                <button class="secondary" data-counterbid="${bd.id}">↩ Motbud</button>
                <button class="danger" data-rejectbid="${bd.id}">Avslå</button>` : ''}</td>
            </tr>`;
          }).join('')}
          </tbody>
        </table></div>`;
    }
  }

  const haulerLabel = hauler ? esc(hauler.name) + (hauler.company ? ' (' + esc(hauler.company) + ')' : '') : 'okänd åkare';
  const statusBanner =
    b.status === 'open' ? `<div class="banner info">Körningen är <b>öppen</b>. Väntar på att en åkare ska acceptera.</div>`
    : b.status === 'accepted' ? `<div class="banner ok">Körningen är <b>accepterad</b> av ${haulerLabel}.</div>`
    : `<div class="banner warn">Körningen är <b>utförd</b> ${b.completedAt ? '(' + fmtDate(b.completedAt) + ')' : ''}.</div>`;

  mount(`
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
      <a href="#/" class="btn secondary">← Tillbaka</a>
      <h2 style="margin:0">Körning #${b.id}</h2>
      <span class="badge ${b.status}" style="font-size:13px">${STATUS_LABEL[b.status]}</span>
    </div>
    ${statusBanner}
    <div class="row">
      <div class="card">
        <h3>Detaljer</h3>
        <dl class="kv">
          <dt>Från</dt><dd><b>${esc(b.fromLocation)}</b>${b.fromPostal ? ' <span class="muted">(' + esc(b.fromPostal) + ')</span>' : ''}</dd>
          <dt>Till</dt><dd><b>${esc(b.toLocation)}</b>${b.toPostal ? ' <span class="muted">(' + esc(b.toPostal) + ')</span>' : ''}</dd>
          <dt>Lastning</dt><dd>${esc(b.loadDate)} ${esc(b.loadTime || '')}</dd>
          <dt>Lossning</dt><dd>${esc(b.unloadDate)} ${esc(b.unloadTime || '')}</dd>
          ${b.weight ? `<dt>Vikt</dt><dd>${esc(b.weight)} kg</dd>` : ''}
          ${b.flm ? `<dt>Flakmeter (FLM)</dt><dd>${esc(b.flm)}</dd>` : ''}
          ${b.pallets ? `<dt>Antal pall</dt><dd>${esc(b.pallets)} st</dd>` : ''}
          <dt>Krav</dt><dd>
            ${b.adr ? '<span class="badge feature">ADR</span>' : ''}
            ${b.tailLift ? '<span class="badge feature">Bakgavellift</span>' : ''}
            ${b.openSide ? '<span class="badge feature">Öppningsbar sida</span>' : ''}
            ${!b.adr && !b.tailLift && !b.openSide ? '<span class="muted">Inga särskilda</span>' : ''}
          </dd>
          ${hideMoney ? '' : `<dt>Pris</dt><dd>${b.price == null ? '<span class="muted">Åkare föreslår pris</span>' : `<b>${fmtMoney(b.price)}</b>`}</dd>`}
          ${b.description ? `<dt>Beskrivning</dt><dd>${esc(b.description)}</dd>` : ''}
          <dt>Skapad</dt><dd>${fmtDate(b.createdAt)}</dd>
          ${b.acceptedAt ? `<dt>Accepterad</dt><dd>${fmtDate(b.acceptedAt)}</dd>` : ''}
          ${b.completedAt ? `<dt>Utförd</dt><dd>${fmtDate(b.completedAt)}</dd>` : ''}
        </dl>
        ${bookingImgUrl ? `<h3 style="margin-top:12px">Bild på bokning</h3><img src="${bookingImgUrl}" class="thumb">` : ''}
        ${proofImgUrl ? `<h3 style="margin-top:12px">Fraktsedel</h3><img src="${proofImgUrl}" class="thumb">` : ''}
      </div>
      <div class="card">
        <h3>Parter</h3>
        <dl class="kv">
          <dt>Uppdragsgivare</dt><dd><b>${esc(buyer.name)}</b>${buyer.company ? ' · ' + esc(buyer.company) : ''}</dd>
          ${buyerContact}
        </dl>
        ${hauler ? `
          <hr style="margin:14px 0;border:0;border-top:1px solid var(--line)">
          <dl class="kv">
            <dt>Utförande åkare</dt><dd><b>${esc(hauler.name)}</b>${hauler.company ? ' · ' + esc(hauler.company) : ''}</dd>
            ${haulerContact}
          </dl>` : ''}
        <div class="btn-row">${actions}</div>
      </div>
    </div>
    ${bidsBlock}
    ${b.status !== 'open' ? `
    <div class="card" id="assignment-card">
      <h3>Tilldelning</h3>
      <dl class="kv">
        <dt>Bil</dt><dd>${assignedVehicle ? `<b>${esc(assignedVehicle.regNr)}</b>${assignedVehicle.model ? ' · ' + esc(assignedVehicle.model) : ''}` : '<span class="muted">Inte tilldelad ännu</span>'}</dd>
        <dt>Chaufför</dt><dd>${assignedDriver ? `<b>${esc(assignedDriver.name)}</b>${assignedDriver.phone ? ' · ' + esc(assignedDriver.phone) : ''}` : '<span class="muted">Inte tilldelad ännu</span>'}</dd>
      </dl>
      ${(isAssignedHauler || isAdmin) && b.status === 'accepted' ? `
        <div class="btn-row" style="margin-top:8px">
          <button id="assignBtn" class="secondary">${(assignedVehicle || assignedDriver) ? 'Ändra tilldelning' : '🚚 Tilldela bil & chaufför'}</button>
        </div>` : ''}
    </div>` : ''}
    ${(isDriver || ctx.isPublic) ? '' : `<div class="card" id="chat-card">
      <h3>Intern chatt</h3>
      <div id="chat-area"></div>
    </div>`}
  `);

  if (document.getElementById('assignBtn')) {
    document.getElementById('assignBtn').onclick = async () => {
      const vehicles = await db.byIndex('vehicles', 'haulerId', me.id);
      const drivers = await db.byIndex('drivers', 'haulerId', me.id);
      const activeDrivers = drivers.filter(d => d.active !== false);
      if (vehicles.length === 0 || activeDrivers.length === 0) {
        toast('Lägg till minst en bil och en aktiv chaufför först', 'err');
        return;
      }
      const card = document.getElementById('assignment-card');
      card.innerHTML = `
        <h3>Tilldela bil & chaufför</h3>
        <form id="assignForm">
          <div class="row">
            <div class="field"><label>Bil</label>
              <select name="vehicleId" required>
                <option value="">— välj —</option>
                ${vehicles.map(v => `<option value="${v.id}" ${b.vehicleId===v.id?'selected':''}>${esc(v.regNr)} ${esc(v.model || '')}</option>`).join('')}
              </select>
            </div>
            <div class="field"><label>Chaufför</label>
              <select name="driverId" required>
                <option value="">— välj —</option>
                ${activeDrivers.map(d => `<option value="${d.id}" ${b.driverId===d.id?'selected':''}>${esc(d.name)}</option>`).join('')}
              </select>
            </div>
          </div>
          <div class="btn-row">
            <button type="submit">Spara tilldelning</button>
            <button type="button" id="assignCancel" class="secondary">Avbryt</button>
          </div>
        </form>`;
      document.getElementById('assignCancel').onclick = () => navigate('/booking/' + b.id);
      document.getElementById('assignForm').onsubmit = async e => {
        e.preventDefault();
        const f = new FormData(e.target);
        const fresh = await db.get('bookings', b.id);
        fresh.vehicleId = f.get('vehicleId') || null;
        fresh.driverId = f.get('driverId') || null;
        fresh.assignedAt = new Date().toISOString();
        await db.put('bookings', fresh);
        toast('Tilldelning sparad');
        navigate('/booking/' + b.id);
      };
    };
  }

  // Bind actions
  if (document.getElementById('acceptBtn')) {
    document.getElementById('acceptBtn').onclick = async () => {
      try {
        if (!me || !me.id) { toast('Du måste vara inloggad', 'err'); return navigate('/login'); }
        const fresh = await db.get('bookings', b.id);
        if (!fresh) { toast('Bokningen finns inte', 'err'); return navigate('/'); }
        if (fresh.status !== 'open') { toast('Körningen är redan accepterad', 'err'); return navigate('/'); }
        fresh.status = 'accepted';
        fresh.haulerId = me.id;
        fresh.acceptedAt = Date.now();
        fresh.commission = commissionFor(fresh.price);
        fresh.contactVisible = true;
        await db.put('bookings', fresh);
        await notify(fresh.buyerId, { type:'accepted', bookingId: fresh.id, message: `${me.name} har accepterat din körning ${fresh.fromLocation} → ${fresh.toLocation}.` });
        toast('Uppdrag accepterat. Kontaktuppgifter visas nu.');
        navigate('/booking/' + fresh.id);
      } catch (err) {
        console.error('Accept-fel:', err);
        toast('Kunde inte acceptera: ' + (err.message || err), 'err');
      }
    };
  }

  // Bud-actions (åkare som lägger bud)
  const placeBidBtn = document.getElementById('placeBidBtn');
  if (placeBidBtn) {
    placeBidBtn.onclick = async () => {
      try {
        if (!me || !me.id) { toast('Du måste vara inloggad', 'err'); return navigate('/login'); }
        const amountEl = document.getElementById('bidAmount');
        const amount = Number(amountEl && amountEl.value);
        if (!amount || amount <= 0) { toast('Ange ett giltigt belopp', 'err'); return; }
        const fresh = await db.get('bookings', b.id);
        if (!fresh) { toast('Bokningen finns inte', 'err'); return navigate('/'); }
        if (fresh.status !== 'open') { toast('Körningen är inte längre öppen', 'err'); return navigate('/'); }
        await db.add('bids', {
          bookingId: b.id, haulerId: me.id,
          rounds: [{ by:'hauler', amount, at: Date.now() }],
          status: 'pending',
          createdAt: Date.now(),
        });
        await notify(b.buyerId, { type:'new_bid', bookingId: b.id, message: `Nytt bud (${fmtMoney(amount)}) från ${me.name} på ${b.fromLocation} → ${b.toLocation}.` });
        toast('Bud skickat — uppdragsgivaren har aviserats');
        navigate('/booking/' + b.id);
      } catch (err) {
        console.error('Bud-fel:', err);
        toast('Kunde inte lägga bud: ' + (err.message || err), 'err');
      }
    };
  }
  const acceptCounterBtn = document.getElementById('acceptCounterBtn');
  if (acceptCounterBtn) {
    acceptCounterBtn.onclick = async () => {
      try {
        if (!me || !me.id) { toast('Du måste vara inloggad', 'err'); return navigate('/login'); }
        const bid = await db.get('bids', acceptCounterBtn.dataset.bid);
        if (!bid) { toast('Budet hittas inte', 'err'); return; }
        const amount = latestBidAmount(bid);
        const fresh = await db.get('bookings', b.id);
        if (!fresh || fresh.status !== 'open') { toast('Körningen är inte längre öppen', 'err'); return navigate('/'); }
        fresh.status = 'accepted'; fresh.haulerId = me.id;
        fresh.price = amount;
        fresh.acceptedAt = Date.now();
        fresh.commission = commissionFor(amount);
        fresh.contactVisible = true;
        await db.put('bookings', fresh);
        bid.status = 'accepted';
        await db.put('bids', bid);
        const others = await bidsForBooking(b.id);
        for (const o of others) {
          if (o.id !== bid.id && o.status === 'pending') {
            o.status = 'rejected';
            await db.put('bids', o);
            await notify(o.haulerId, { type:'bid_rejected', bookingId: b.id, message: `Ditt bud på ${b.fromLocation} → ${b.toLocation} avslogs (uppdraget gick till annan åkare).` });
          }
        }
        await notify(b.buyerId, { type:'accepted', bookingId: b.id, message: `${me.name} accepterade ditt motbud ${fmtMoney(amount)} på ${b.fromLocation} → ${b.toLocation}.` });
        toast('Motbud accepterat. Kontaktuppgifter visas nu.');
        navigate('/booking/' + b.id);
      } catch (err) {
        console.error('Accept-counter-fel:', err);
        toast('Kunde inte acceptera motbud: ' + (err.message || err), 'err');
      }
    };
  }
  const counterBackBtn = document.getElementById('counterBackBtn');
  if (counterBackBtn) {
    counterBackBtn.onclick = async () => {
      try {
        const amount = Number((document.getElementById('newCounter') || {}).value);
        if (!amount || amount <= 0) { toast('Ange ett giltigt belopp', 'err'); return; }
        const bid = await db.get('bids', counterBackBtn.dataset.bid);
        if (!bid) { toast('Budet hittas inte', 'err'); return; }
        bid.rounds.push({ by:'hauler', amount, at: Date.now() });
        await db.put('bids', bid);
        await notify(b.buyerId, { type:'counter', bookingId: b.id, message: `${me.name} svarade med motbud ${fmtMoney(amount)} på ${b.fromLocation} → ${b.toLocation}.` });
        toast('Motbud skickat');
        navigate('/booking/' + b.id);
      } catch (err) {
        console.error('Motbud-fel:', err);
        toast('Kunde inte skicka motbud: ' + (err.message || err), 'err');
      }
    };
  }
  const withdrawBidBtn = document.getElementById('withdrawBidBtn');
  if (withdrawBidBtn) {
    withdrawBidBtn.onclick = async () => {
      if (!confirm('Dra tillbaka ditt bud?')) return;
      const bid = await db.get('bids', withdrawBidBtn.dataset.bid);
      bid.status = 'withdrawn';
      await db.put('bids', bid);
      await notify(b.buyerId, { type:'bid_withdrawn', bookingId: b.id, message: `${me.name} drog tillbaka sitt bud på ${b.fromLocation} → ${b.toLocation}.` });
      toast('Bud tillbakadraget');
      navigate('/booking/' + b.id);
    };
  }

  // Buyer-actions: acceptera bud / motbud / avslå
  document.querySelectorAll('button[data-acceptbid]').forEach(btn => {
    btn.onclick = async () => {
      const bid = await db.get('bids', btn.dataset.acceptbid);
      const amount = latestBidAmount(bid);
      const fresh = await db.get('bookings', b.id);
      if (fresh.status !== 'open') { toast('Körningen är inte längre öppen', 'err'); return navigate('/'); }
      fresh.status = 'accepted';
      fresh.haulerId = bid.haulerId;
      fresh.price = amount;
      fresh.acceptedAt = Date.now();
      fresh.commission = commissionFor(amount);
      fresh.contactVisible = true;
      await db.put('bookings', fresh);
      bid.status = 'accepted';
      await db.put('bids', bid);
      const all = await bidsForBooking(b.id);
      for (const o of all) {
        if (o.id !== bid.id && o.status === 'pending') {
          o.status = 'rejected';
          await db.put('bids', o);
          await notify(o.haulerId, { type:'bid_rejected', bookingId: b.id, message: `Ditt bud på ${b.fromLocation} → ${b.toLocation} avslogs (uppdraget gick till annan åkare).` });
        }
      }
      await notify(bid.haulerId, { type:'bid_accepted', bookingId: b.id, message: `Ditt bud ${fmtMoney(amount)} på ${b.fromLocation} → ${b.toLocation} accepterades. Kontaktuppgifter är nu synliga.` });
      toast('Bud accepterat — körningen tilldelad');
      navigate('/booking/' + b.id);
    };
  });
  document.querySelectorAll('button[data-counterbid]').forEach(btn => {
    btn.onclick = async () => {
      const id = btn.dataset.counterbid;
      const inp = document.querySelector(`input[data-counter-input="${id}"]`);
      const amount = Number(inp && inp.value);
      if (!amount || amount <= 0) { toast('Ange ett giltigt motbud', 'err'); return; }
      const bid = await db.get('bids', id);
      bid.rounds.push({ by:'buyer', amount, at: Date.now() });
      await db.put('bids', bid);
      await notify(bid.haulerId, { type:'counter', bookingId: b.id, message: `Uppdragsgivaren skickade motbud ${fmtMoney(amount)} på ${b.fromLocation} → ${b.toLocation}.` });
      toast('Motbud skickat');
      navigate('/booking/' + b.id);
    };
  });
  document.querySelectorAll('button[data-rejectbid]').forEach(btn => {
    btn.onclick = async () => {
      if (!confirm('Avslå budet?')) return;
      const bid = await db.get('bids', btn.dataset.rejectbid);
      bid.status = 'rejected';
      await db.put('bids', bid);
      await notify(bid.haulerId, { type:'bid_rejected', bookingId: b.id, message: `Ditt bud på ${b.fromLocation} → ${b.toLocation} avslogs.` });
      toast('Bud avslaget');
      navigate('/booking/' + b.id);
    };
  });
  if (document.getElementById('completeBtn')) {
    document.getElementById('completeBtn').onclick = async () => {
      try {
        const proofFile = document.getElementById('proofFile').files[0];
        if (!proofFile) { toast('Ladda upp bild på fraktsedel först', 'err'); return; }
        const proofUrl = await uploadImage(proofFile, 'proof-images');
        const fresh = await db.get('bookings', b.id);
        fresh.status = 'completed';
        fresh.completedAt = new Date().toISOString();
        fresh.proofImageUrl = proofUrl;
        delete fresh.proofImage;
        delete fresh.bookingImage;
        if (isDriver) fresh.completedByDriverId = me.id;
        await db.put('bookings', fresh);
        await notify(fresh.buyerId, { type:'completed', bookingId: fresh.id, message: `${me.name} har utfört körningen ${fresh.fromLocation} → ${fresh.toLocation}.` });
        toast('Uppdrag markerat som utfört');
        navigate('/booking/' + fresh.id);
      } catch (err) {
        console.error('Complete-fel:', err);
        toast('Kunde inte markera som utförd: ' + (err.message || err), 'err');
      }
    };
  }
  if (document.getElementById('toggleContactBtn')) {
    document.getElementById('toggleContactBtn').onclick = async () => {
      const fresh = await db.get('bookings', b.id);
      fresh.contactVisible = !fresh.contactVisible;
      await db.put('bookings', fresh);
      navigate('/booking/' + fresh.id);
    };
  }
  if (document.getElementById('cancelBtn')) {
    document.getElementById('cancelBtn').onclick = async () => {
      if (!confirm('Ta bort körningen permanent?')) return;
      await db.del('bookings', b.id);
      const msgs = await db.byIndex('messages', 'bookingId', b.id);
      for (const m of msgs) await db.del('messages', m.id);
      toast('Körning borttagen');
      navigate('/');
    };
  }

  if (!isDriver && !ctx.isPublic) await renderChat(b, buyer, hauler, me, ctx);
}

// --------- Chatt ---------
// Trådmodell: (bookingId, haulerId) — en tråd per åkare som skriver med köparen.
// När bokningen är accepterad finns bara den accepterade åkarens tråd.
async function renderChat(b, buyer, hauler, me, ctx) {
  const area = document.getElementById('chat-area');
  const { isBuyer, isAssignedHauler, isOtherHauler, isAdmin } = ctx;

  if (b.status === 'open' && isBuyer) {
    // Köparen: visa trådlista (en per åkare som skrivit)
    const all = await db.byIndex('messages', 'bookingId', b.id);
    const byHauler = {};
    all.forEach(m => {
      const hid = m.haulerId;
      (byHauler[hid] = byHauler[hid] || []).push(m);
    });
    const haulerIds = Object.keys(byHauler).map(Number);
    if (haulerIds.length === 0) {
      area.innerHTML = `<div class="muted">Inga åkare har kontaktat dig om denna körning ännu.</div>`;
      return;
    }
    const haulers = await Promise.all(haulerIds.map(id => db.get('users', id)));
    const dealClosed = b.status !== 'open';
    area.innerHTML = `
      <div class="chat-thread-list" id="thread-list">
        ${haulers.map((h, i) => `<div class="thread-item" data-hid="${h.id}">
          <b>${dealClosed ? esc(h.name) : 'Åkare ' + String.fromCharCode(66 + i)}</b>${dealClosed && h.company ? ' · ' + esc(h.company) : ''}
          <div class="muted" style="font-size:11px;margin-top:2px">${byHauler[h.id].length} meddelanden</div>
        </div>`).join('')}
      </div>
      <div id="thread-body"></div>
    `;
    const pickHauler = async hid => {
      document.querySelectorAll('.thread-item').forEach(el => el.classList.toggle('active', el.dataset.hid === hid));
      await renderChatThread(b, buyer, await db.get('users', hid), me, ctx);
    };
    document.querySelectorAll('.thread-item').forEach(el => el.onclick = () => pickHauler(el.dataset.hid));
    await pickHauler(haulerIds[0]);
    return;
  }

  // Annars: rak tråd
  let threadHauler = hauler;
  if (isOtherHauler) threadHauler = me; // åkare som skriver om en öppen bokning → deras egen tråd
  if (!threadHauler) {
    area.innerHTML = `<div class="muted">Ingen chatt ännu.</div>`;
    return;
  }
  await renderChatThread(b, buyer, threadHauler, me, ctx);
}

async function renderChatThread(b, buyer, threadHauler, me, ctx) {
  const { isBuyer, isAdmin } = ctx;
  const body = document.getElementById('thread-body') || document.getElementById('chat-area');
  const msgs = (await db.byIndex('messages', 'bookingId', b.id)).filter(m => m.haulerId === threadHauler.id);
  msgs.sort((a, b) => a.createdAt - b.createdAt);

  const users = {};
  users[buyer.id] = buyer;
  users[threadHauler.id] = threadHauler;

  const dealClosed = b.status !== 'open';
  const canWrite = !isAdmin && b.status !== 'completed' && (
    me.id === buyer.id ||
    me.id === threadHauler.id
  );

  // Pseudonym före accept: A för uppdragsgivare, B för motparten
  const aliasFor = (uid) => {
    if (dealClosed) return users[uid]?.name || '?';
    if (uid === buyer.id) return 'Uppdragsgivare A';
    if (uid === threadHauler.id) return 'Åkare B';
    return 'Användare';
  };

  body.innerHTML = `
    ${!dealClosed ? `<div class="banner warn" style="margin-bottom:10px">⚠ Anonym chatt: namn, företag, telefon, e-post och webbadresser döljs automatiskt tills uppdraget är accepterat.</div>` : ''}
    <div class="chat" id="chat-box">
      ${msgs.length === 0 ? `<div class="muted" style="text-align:center;padding:20px">Inga meddelanden ännu</div>` : ''}
      ${msgs.map(m => {
        const isMe = m.senderId === me.id;
        const who = aliasFor(m.senderId);
        let txt = m.content;
        if (!dealClosed && m.senderId !== me.id) {
          const knownNames = [buyer.name, buyer.company, threadHauler.name, threadHauler.company].filter(Boolean);
          txt = detectContact(txt, knownNames).masked;
        }
        return `<div class="msg ${isMe ? 'me' : 'them'}">
          <div class="who">${esc(who)}</div>
          <div>${esc(txt)}</div>
          <div class="ts">${fmtDate(m.createdAt)}</div>
        </div>`;
      }).join('')}
    </div>
    ${canWrite ? `
      <div class="chat-input">
        <textarea id="chat-txt" placeholder="Skriv ett meddelande..."></textarea>
        <button id="chat-send">Skicka</button>
      </div>
      <div id="chat-warn" class="banner err" style="display:none;margin-top:6px"></div>` : (isAdmin ? `<div class="muted" style="margin-top:8px;font-size:12px">Du ser chatten som admin men kan inte skriva.</div>` : '')}
  `;

  const box = document.getElementById('chat-box');
  box.scrollTop = box.scrollHeight;

  const send = async () => {
    const raw = document.getElementById('chat-txt').value.trim();
    if (!raw) return;
    if (!dealClosed) {
      const knownNames = [buyer.name, buyer.company, threadHauler.name, threadHauler.company].filter(Boolean);
      const det = detectContact(raw, knownNames);
      if (det.hits.length > 0) {
        const w = document.getElementById('chat-warn');
        w.style.display = '';
        w.innerHTML = `🚫 Det är inte tillåtet att dela kontaktuppgifter (${det.hits.join(', ')}) i chatten innan uppdraget är accepterat. Meddelandet skickades inte.`;
        return;
      }
    }
    await db.add('messages', {
      bookingId: b.id,
      haulerId: threadHauler.id,
      senderId: me.id,
      content: raw,
      createdAt: Date.now(),
    });
    // Notifiera motparten
    const recipient = me.id === buyer.id ? threadHauler.id : buyer.id;
    await notify(recipient, { type:'new_message', bookingId: b.id, message: `Nytt meddelande från ${aliasFor(me.id)} i chatt om ${b.fromLocation} → ${b.toLocation}.` });
    document.getElementById('chat-txt').value = '';
    renderChatThread(b, buyer, threadHauler, me, ctx);
  };
  if (document.getElementById('chat-send')) {
    document.getElementById('chat-send').onclick = send;
    document.getElementById('chat-txt').onkeydown = e => {
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
    };
  }
}

// --------- Start ---------
(async () => {
  try {
    await refreshSession();
    // Lyssna på auth-ändringar (login/logout i annan flik etc.)
    sb.auth.onAuthStateChange(async (event, session) => {
      await refreshSession();
      render();
    });
    render();
  } catch (e) {
    console.error('Init-fel:', e);
    document.getElementById('app').innerHTML = '<main><div class="card"><h2>Fel vid uppstart</h2><pre>' + (e.message || e) + '</pre></div></main>';
  }
})();
</script>
